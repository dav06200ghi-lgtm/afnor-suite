const {useState,useRef,useMemo,useCallback} = React;

// ── DATA ──────────────────────────────────────────────────────────────────────
const BT=[
  {id:"BT-1",g:"header",l:"Invoice number",fr:"Numéro de facture",m:true,s:["ei","er"],t:"Identifier",d:"Identifiant unique attribué par le vendeur. Unique par vendeur et par exercice fiscal. Ne peut jamais être réutilisé même après rejet (211) ou refus (210). Référencé dans tous les CDAR ILC.",diff:"EI: identifie la facture dans le réseau PA/PPF, référencé dans tous les CDAR ILC. ER: identifie la transaction déclarée au DGFiP (non routée vers l'acheteur).",r:"BR-2",ex:"FA-2026-00123"},
  {id:"BT-2",g:"header",l:"Invoice issue date",fr:"Date d'émission",m:true,s:["ei","er"],t:"Date",d:"Date d'émission au format YYYY-MM-DD. Détermine la période TVA pour le DGFiP. Ne peut pas être une date future. Délai max de soumission : 30 jours après émission.",diff:"EI: date de la facture transmise à l'acheteur. ER: date de l'opération déclarée au fisc.",r:"BR-3",ex:"2026-09-01"},
  {id:"BT-3",g:"header",l:"Invoice type code",fr:"Code type de facture",m:true,s:["ei"],t:"Code",d:"UNTDID 1001. Valeurs possibles : 380=Facture standard, 381=Avoir/Note de crédit (annulation), 384=Facture rectificative (remplacement partiel), 389=Autofacturation (buyer creates), 394=Location/leasing.",r:"BR-4",ex:"380"},
  {id:"BT-5",g:"header",l:"Invoice currency code",fr:"Devise de facturation",m:true,s:["ei"],t:"Code",d:"ISO 4217 alpha-3. La TVA doit aussi être exprimée en EUR quand la devise diffère (via BT-6 et BT-111). Taux de change BCE à la date BT-2.",r:"BR-5",ex:"EUR"},
  {id:"BT-6",g:"header",l:"VAT accounting currency",fr:"Devise comptable TVA",m:false,s:["ei"],t:"Code",d:"Requis uniquement quand BT-5 ≠ EUR. La TVA française doit toujours être déclarée en EUR au DGFiP. Valeur fixe EUR pour toute facture française avec devise étrangère.",r:"BR-53",ex:"EUR"},
  {id:"BT-7",g:"header",l:"VAT point date",fr:"Date du fait générateur TVA",m:false,s:["ei"],t:"Date",d:"Date d'exigibilité TVA au format YYYY-MM-DD. Critique : TVA sur les débits = date facture (BT-2), TVA sur les encaissements = date paiement. Détermine la période de déclaration TVA.",r:"BR-AFNOR-01",ex:"2026-09-01"},
  {id:"BT-8",g:"header",l:"VAT point date code",fr:"Code date fait générateur",m:false,s:["ei"],t:"Code",d:"UNTDID 2005. Valeurs possibles : 3=Date facture/invoice date (TVA sur débits, le plus courant — débiter la TVA à la date d'émission), 35=Date livraison/delivery date (transfert de propriété — ex: vente de marchandises), 432=Date paiement/payment date (TVA sur encaissements — prestataires de services, encaissent la TVA à la réception du paiement). Ce champ détermine BT-7.",r:"BR-AFNOR-02",ex:"3=débits | 35=livraison | 432=encaissements"},
  {id:"BT-9",g:"header",l:"Payment due date",fr:"Date d'échéance",m:false,s:["ei"],t:"Date",d:"Date limite de paiement. Pénalités de retard applicables à partir du lendemain (art. L441-10 C.com). Taux légal ou contractuel. Obligatoire si les conditions de paiement prévoient une échéance.",r:"",ex:"2026-10-01"},
  {id:"BT-10",g:"header",l:"Buyer reference",fr:"Référence acheteur",m:false,s:["ei"],t:"Text",d:"Référence bon de commande ou code de routage requis par l'acheteur. Permet le rapprochement avec la commande interne. Souvent obligatoire dans les contrats B2B et chez les grandes enseignes.",r:"",ex:"PO-2026-0055"},
  {id:"BT-20",g:"header",l:"Payment terms",fr:"Conditions de paiement",m:false,s:["ei"],t:"Text",d:"Conditions de paiement en texte libre. Obligatoire sur les factures B2B françaises (art. L441-9 C.com) : délai, mode, escompte éventuel, taux de pénalités de retard.",r:"",ex:"30 jours nets fin de mois"},
  {id:"BT-23",g:"header",l:"Business process type",fr:"Type de processus métier",m:false,s:["ei"],t:"Identifier",d:"Identifiant du processus métier ou workflow. Utilisé dans les profils PEPPOL pour distinguer les cas d'usage. En France, valeur PEPPOL BIS 3.0 : urn:fdc:peppol.eu:2017:poacc:billing:01:1.0",r:"",ex:"urn:fdc:peppol.eu:2017:poacc:billing:01:1.0"},
  {id:"BT-24",g:"header",l:"Specification identifier",fr:"Identifiant de spécification",m:true,s:["ei"],t:"Identifier",d:"URI de profil conformément à EN 16931. Valeur obligatoire : urn:cen.eu:en16931:2017. Sans ce champ, la facture sera rejetée par le PPF (règle BR-1).",r:"BR-1",ex:"urn:cen.eu:en16931:2017"},
  {id:"BT-21",g:"notes",l:"Invoice note subject code",fr:"Code sujet de la note",m:false,s:["ei"],t:"Code",d:"Spécifique AFNOR XP Z12-012. Valeurs : AAK=régime fiscal (franchise, TVA agricole...), BAR=indicateur périmètre e-invoicing (OBLIGATOIRE — BR-FR-20), TXD=régime TVA, ZZZ=texte libre.",r:"BR-FR-05",ex:"BAR"},
  {id:"BT-22",g:"notes",l:"Invoice note",fr:"Note de facture",m:false,s:["ei"],t:"Text",d:"Contenu de la note associée à BT-21. Quand BT-21=BAR → confirme périmètre e-invoicing. Quand BT-21=AAK → indique le régime fiscal (FRANCHISE_TVA pour micro-entreprises art. 293B CGI).",r:"BR-FR-06",ex:"CHORUS_PRO"},
  {id:"BT-27",g:"seller",l:"Seller name",fr:"Dénomination sociale vendeur",m:true,s:["ei","er"],t:"Text",d:"Raison sociale complète du vendeur telle qu'enregistrée au RCS/RCSM. Doit correspondre exactement à l'enregistrement officiel. Pour auto-entrepreneurs : nom complet de la personne physique.",diff:"EI: apparaît dans la facture transmise à l'acheteur. ER: identifie le déclarant auprès du DGFiP.",r:"BR-6",ex:"Acme France SAS"},
  {id:"BT-29",g:"seller",l:"Seller identifier",fr:"Identifiant vendeur",m:false,s:["ei"],t:"Identifier",d:"Identifiant supplémentaire du vendeur. Schéma : 0009=SIRET (14 chiffres), 0002=SIREN (9 chiffres). Critique pour la recherche dans l'Annuaire PPF et le routage. Format : schemeID:valeur.",r:"BR-FR-01",ex:"0009:12345678900010"},
  {id:"BT-30",g:"seller",l:"Seller SIREN/SIRET",fr:"SIREN/SIRET vendeur",m:true,s:["ei","er"],t:"Identifier",d:"OBLIGATOIRE AFNOR XP Z12-012. SIREN (9 chiffres, schème 0002) ou SIRET (14 chiffres, schème 0009). Requis pour le routage PPF et l'identification DGFiP. Rejet BR-FR-02 si absent.",diff:"EI: permet le routage via l'Annuaire PPF. ER: identifie l'assujetti TVA auprès du DGFiP.",r:"BR-FR-02",ex:"0009:12345678900010"},
  {id:"BT-31",g:"seller",l:"Seller VAT number",fr:"Numéro TVA vendeur",m:false,s:["ei","er"],t:"Identifier",d:"Numéro TVA intracommunautaire. Format FR : FR + 2 car. clé + 9 chiffres SIREN. Obligatoire si assujetti TVA. Non requis pour franchise en base (BT-21=AAK, BT-22=FRANCHISE_TVA).",r:"BR-CO-9",ex:"FR12345678900"},
  {id:"BT-33",g:"seller",l:"Seller legal info",fr:"Mentions légales vendeur",m:false,s:["ei"],t:"Text",d:"Mentions légales obligatoires art. R123-237 C.com : capital social, numéro RCS + ville, code APE/NAF. Pour SAS/SARL : capital + greffe. Pour auto-entrepreneurs : numéro SIREN suffit.",r:"",ex:"SAS capital 100 000€ - RCS Paris 123456789"},
  {id:"BT-34",g:"seller",l:"Seller electronic address (Annuaire)",fr:"Adresse électronique vendeur",m:false,s:["ei"],t:"Identifier",d:"Endpoint du vendeur dans l'Annuaire PPF. Schème 0009 + SIRET. Utilisé pour router les factures entrantes vers la PA du vendeur. À enregistrer lors de l'inscription PA.",r:"",ex:"0009:12345678900010"},
  {id:"BT-56",g:"seller",l:"Seller contact point name",fr:"Nom contact vendeur",m:false,s:["ei"],t:"Text",d:"Nom du contact ou du service vendeur à contacter pour questions sur la facture. Exemple : 'Service Facturation', 'Comptabilité Clients'. Complète BT-57 et BT-58.",r:"",ex:"Service Facturation"},
  {id:"BT-57",g:"seller",l:"Seller contact telephone number",fr:"Téléphone contact vendeur",m:false,s:["ei"],t:"Text",d:"Numéro de téléphone du contact vendeur. Format libre. Recommandation : inclure l'indicatif international pour les factures internationales.",r:"",ex:"+33 1 23 45 67 89"},
  {id:"BT-58",g:"seller",l:"Seller contact email address",fr:"Email contact vendeur",m:false,s:["ei"],t:"Text",d:"Adresse email du contact vendeur pour les questions relatives à la facture. Distinct de l'adresse électronique Annuaire (BT-34). Permet à l'acheteur de contacter directement le bon interlocuteur.",r:"",ex:"facturation@acme.fr"},
  {id:"BT-40b",g:"seller",l:"Seller country code",fr:"Pays vendeur",m:true,s:["ei"],t:"Code",d:"ISO 3166-1 alpha-2. FR pour la France métropolitaine. DOM-TOM : GP=Guadeloupe, MQ=Martinique, RE=La Réunion, GF=Guyane, YT=Mayotte, PM=Saint-Pierre-et-Miquelon, NC=Nouvelle-Calédonie, PF=Polynésie.",r:"BR-9",ex:"FR"},
  {id:"BT-44",g:"buyer",l:"Buyer name",fr:"Dénomination sociale acheteur",m:true,s:["ei","er"],t:"Text",d:"Raison sociale complète de l'acheteur.",diff:"EI: destinataire de la facture. ER B2B-INT: identifie l'acheteur étranger. ER B2C: non requis (protection données personnelles RGPD).",r:"BR-7",ex:"Client Corp SARL"},
  {id:"BT-46",g:"buyer",l:"Buyer identifier",fr:"Identifiant acheteur",m:false,s:["ei"],t:"Identifier",d:"Identifiant de l'acheteur dans le système du vendeur. Schème libre ou normalisé. Utilisé pour le rapprochement interne. Différent de BT-47 (SIREN/SIRET officiel).",r:"",ex:"CUST-00456"},
  {id:"BT-47",g:"buyer",l:"Buyer legal identifier (ICD)",fr:"Identifiant légal acheteur (ICD)",m:false,s:["ei","er"],t:"Identifier",d:"Identifiant légal de l'acheteur selon son pays. Règles de sélection du schème ICD (ISO 6523) : • FR (LAND1=FR) → ICD 0002 + SIREN (9 chiffres, positions 3-11 du numéro TVA) • UE hors FR (pays ≠ FR, TVA UE connue) → ICD 0223 + numéro TVA complet (ex: DE123456789) • Hors UE ou pas de TVA UE → ICD 0227 + code pays + nom ≤ 16 car. (ex: US-ACME_INC_USA) • Nouvelle-Calédonie (NC) → ICD 0228 + RIDET • Polynésie française (PF) → ICD 0229 + identifiant local • Sinon (hors UE sans TVA identifiable) → champ absent",diff:"EI: crucial pour le routage via l'Annuaire PPF. ER: identifie l'acheteur dans la déclaration DGFiP.",r:"BR-FR-03",ex:"0002:123456789 (FR) | 0223:DE123456789 (UE) | 0227:US-ACMEINC"},
  {id:"BT-48",g:"buyer",l:"Buyer VAT number",fr:"Numéro TVA acheteur",m:false,s:["ei","er"],t:"Identifier",d:"Numéro TVA intracommunautaire de l'acheteur. Requis pour transactions intra-UE et autoliquidation (BT-118=AE ou K). Pour acheteurs hors UE : leur numéro fiscal local. Format UE : code pays + chiffres.",r:"BR-CO-9",ex:"FR98765432100"},
  {id:"BT-49",g:"buyer",l:"Buyer electronic address (Annuaire)",fr:"Adresse électronique acheteur",m:false,s:["ei"],t:"Identifier",d:"CRITIQUE : Endpoint acheteur dans l'Annuaire PPF. Sans cette adresse → rejet automatique CDAR 211 code AB (Destinataire introuvable). L'acheteur DOIT s'enregistrer via sa PA AVANT la première facture. Schème recommandé : 0009 + SIRET.",r:"ANNUAIRE",ex:"0009:98765432100024"},
  {id:"BT-57b",g:"buyer",l:"Buyer country code",fr:"Pays acheteur",m:true,s:["ei"],t:"Code",d:"ISO 3166-1 alpha-2. FR=B2B domestique (e-invoicing). Autre=international → e-reporting B2B-INT obligatoire. Codes spéciaux : NC=Nouvelle-Calédonie (ICD 0228), PF=Polynésie (ICD 0229).",r:"BR-11",ex:"FR"},
  {id:"BT-102",g:"vat",l:"Document level charge VAT cat. code",fr:"Code cat. TVA majoration document (BG-21)",m:false,s:["ei"],t:"Code",d:"Catégorie TVA applicable à la majoration au niveau document (BG-21 = frais de transport, frais de dossier...). Valeurs UNTDID 5305 identiques à BT-118. Exemples : S=Standard, E=Exonéré, G=Export, Z=Taux zéro, AE=Autoliquidation. Règles : BT-102=E → BT-103=0 (BR-E-07), BT-102=G → BT-103=0 (BR-G-07), BT-102=S → BT-103=20 (standard FR).",diff:"Applicable uniquement en E-Invoicing. L'e-reporting n'utilise pas le détail des majorations.",r:"BR-E-07",ex:"S (standard 20%) | E (exonéré 0%) | G (export 0%) | Z (taux zéro 0%)"},
  {id:"BT-103",g:"vat",l:"Document level charge VAT rate",fr:"Taux TVA majoration document (BG-21)",m:false,s:["ei"],t:"Percentage",d:"Taux TVA de la majoration au niveau document. Doit être cohérent avec BT-102. Règles obligatoires EN16931 : BT-102=E (Exonéré) → BT-103=0, BT-102=G (Export) → BT-103=0, BT-102=Z (Taux zéro) → BT-103=0, BT-102=AE (Autoliquidation) → BT-103=0, BT-102=K (Intra-UE) → BT-103=0, BT-102=S (Standard) → BT-103=20/10/5.5/2.1 selon le taux applicable.",diff:"Applicable uniquement en E-Invoicing. Champs BG-21 non transmis en e-reporting.",r:"BR-S-07",ex:"0 (si BT-102=E,G,Z,AE) | 20 (si BT-102=S)"},
  {id:"BT-95",g:"vat",l:"Document level allowance VAT cat. code",fr:"Code cat. TVA remise document (BG-20)",m:false,s:["ei"],t:"Code",d:"Catégorie TVA applicable à la remise au niveau document (BG-20 = remises globales, ristournes...). Mêmes valeurs que BT-118. Pendant de BT-102 mais pour les remises (allowances) au lieu des majorations (charges). Règles identiques : BT-95=E → BT-96=0, BT-95=G → BT-96=0.",r:"BR-E-06",ex:"S | E | G | Z"},
  {id:"BT-96",g:"vat",l:"Document level allowance VAT rate",fr:"Taux TVA remise document (BG-20)",m:false,s:["ei"],t:"Percentage",d:"Taux TVA de la remise au niveau document. Pendant de BT-103. BT-95=E → BT-96=0, BT-95=G → BT-96=0, BT-95=S → BT-96=20/10/5.5/2.1.",r:"BR-S-06",ex:"0 (exonéré) | 20 (standard)"},
  {id:"BT-106",g:"amounts",l:"Sum of invoice lines (net)",fr:"Total HT des lignes",m:true,s:["ei"],t:"Amount",d:"Somme de tous les montants nets des lignes (BT-131). E-Invoicing uniquement : l'e-reporting utilise des montants agrégés. Doit être égal à la somme mathématique exacte de chaque ligne.",r:"BR-13",ex:"1000.00"},
  {id:"BT-109",g:"amounts",l:"Invoice total excl. VAT",fr:"Total HT net",m:true,s:["ei","er"],t:"Amount",d:"BT-106 − BT-102 (remises document) + BT-103 (majorations document). Base imposable pour le calcul TVA.",diff:"EI: total HT avec détail par ligne. ER: montant HT agrégé par taux TVA sur la période (pas par facture).",r:"BR-14",ex:"950.00"},
  {id:"BT-110",g:"amounts",l:"Total VAT amount",fr:"Montant TVA total",m:true,s:["ei","er"],t:"Amount",d:"Somme de tous les BT-117 (TVA par catégorie). Tolérance d'arrondi : ±0.02 EUR. Chiffre clé pour le DGFiP.",diff:"EI: TVA totale de la facture. ER: TVA agrégée quotidienne par taux déclarée au DGFiP.",r:"BR-CO-14",ex:"190.00"},
  {id:"BT-112",g:"amounts",l:"Invoice total incl. VAT",fr:"Total TTC",m:true,s:["ei","er"],t:"Amount",d:"BT-109 + BT-110. Montant total avant déduction d'éventuels acomptes. Tolérance ±0.02 EUR.",diff:"EI: montant dû par l'acheteur. ER: total TTC agrégé déclaré au fisc.",r:"BR-CO-15",ex:"1140.00"},
  {id:"BT-113",g:"amounts",l:"Paid amount",fr:"Montant déjà réglé (acompte)",m:false,s:["ei"],t:"Amount",d:"Montant déjà versé par l'acheteur (acompte, avance). Déduit de BT-112 pour obtenir BT-115. Utilisé dans les factures de solde pour référencer l'acompte versé.",r:"",ex:"200.00"},
  {id:"BT-115",g:"amounts",l:"Amount due for payment",fr:"Montant net à payer",m:true,s:["ei"],t:"Amount",d:"BT-112 − BT-113 (acompte) + BT-114 (arrondi). Montant réel à encaisser. Référencé dans le CDAR 212 (Encaissée). Pour TVA encaissements : déclenche l'exigibilité TVA lors du statut 212.",r:"BR-CO-16",ex:"940.00"},
  {id:"BT-116",g:"vat",l:"VAT category taxable amount",fr:"Base imposable par catégorie",m:true,s:["ei","er"],t:"Amount",d:"Base imposable par catégorie TVA. Répété pour chaque taux utilisé (un bloc BG-23 par taux).",diff:"EI: base imposable par catégorie dans la facture EN16931. ER: base imposable agrégée par taux sur la période.",r:"BR-45",ex:"950.00"},
  {id:"BT-117",g:"vat",l:"VAT category tax amount",fr:"Montant TVA par catégorie",m:true,s:["ei","er"],t:"Amount",d:"Montant TVA = BT-116 × BT-119/100. Tolérance d'arrondi max 0.02 EUR par catégorie. La somme de tous les BT-117 doit égaler BT-110.",r:"BR-CO-17",ex:"190.00"},
  {id:"BT-118",g:"vat",l:"VAT category code",fr:"Code catégorie TVA",m:true,s:["ei","er"],t:"Code",d:"UNTDID 5305. Valeurs : S=Standard (taux normal), Z=Taux zéro (exports exonérés), E=Exonéré (art.261 CGI), AE=Autoliquidation (reverse charge art.283 CGI), K=Intra-UE (art.262ter CGI), G=Export hors UE (art.262 CGI), O=Hors champ TVA, EX=Franchise en base (art.293B CGI).",diff:"EI: code catégorie TVA dans la facture EN16931. ER: même codification dans le flux XML DGFiP propriétaire.",r:"BR-47",ex:"S"},
  {id:"BT-119",g:"vat",l:"VAT rate",fr:"Taux TVA",m:false,s:["ei","er"],t:"Percentage",d:"Taux français : 20%=Standard (biens et services courants), 10%=Intermédiaire (restauration, travaux, transport), 5.5%=Réduit (alimentation, énergie, livres, logement social), 2.1%=Super-réduit (médicaments remboursables, presse). 0 pour exonéré/franchise.",r:"BR-48",ex:"20"},
  {id:"BT-120",g:"vat",l:"VAT exemption reason text",fr:"Motif exonération TVA",m:false,s:["ei"],t:"Text",d:"Requis quand BT-118 ≠ S. Exemples : 'TVA non applicable - art. 293 B du CGI' (franchise), 'Autoliquidation - art. 283 CGI' (reverse charge), 'Exonération art. 262 ter CGI' (intra-UE), 'Exonération art. 262 CGI' (export).",r:"BR-AFNOR-10",ex:"TVA non applicable - art. 293 B du CGI"},
  {id:"BT-121",g:"vat",l:"VAT exemption reason code",fr:"Code motif exonération TVA",m:false,s:["ei"],t:"Code",d:"Code UNCL5305 du motif. Principaux codes : VATEX-EU-132=Exonéré art.132, VATEX-EU-138=Livraison intra-UE, VATEX-EU-146=Export, VATEX-FR-FRANCHISE=Franchise en base France.",r:"",ex:"VATEX-EU-138"},
  {id:"BT-81",g:"payment",l:"Payment means type code",fr:"Code mode de règlement",m:false,s:["ei"],t:"Code",d:"UNTDID 4461. Valeurs : 10=Espèces, 20=Chèque, 30=Virement générique, 48=Carte bancaire, 49=Prélèvement automatique, 57=Virement interne, 58=Virement SEPA (recommandé), 59=Prélèvement SEPA, 97=Compensation.",r:"",ex:"58"},
  {id:"BT-84",g:"payment",l:"Payment account IBAN",fr:"IBAN",m:false,s:["ei"],t:"Identifier",d:"IBAN du vendeur pour le virement SEPA. Format IBAN France : FR76 + 2 banque + 5 guichet + 11 compte + 2 clé = 27 caractères. Requis quand BT-81 = 58 ou 59.",r:"",ex:"FR7612345987650123456789014"},
  {id:"BT-86",g:"payment",l:"Payment means name",fr:"Libellé mode de paiement",m:false,s:["ei"],t:"Text",d:"Libellé libre du mode de paiement. Complète BT-81. Exemples : 'Virement SEPA', 'Prélèvement SEPA CORE', 'Carte Visa'.",r:"",ex:"Virement SEPA"},
  {id:"BT-126",g:"lines",l:"Invoice line identifier",fr:"Identifiant ligne",m:true,s:["ei"],t:"Identifier",d:"Identifiant unique par ligne. Entiers séquentiels recommandés (1, 2, 3...). Référencé dans les avoirs pour corrections ligne par ligne. Doit être unique au sein d'une même facture.",r:"BR-21",ex:"1"},
  {id:"BT-127",g:"lines",l:"Invoice line note",fr:"Note de ligne",m:false,s:["ei"],t:"Text",d:"Commentaire libre au niveau de la ligne. Précisions sur la prestation : période d'exécution, référence interne, conditions particulières.",r:"",ex:"Période sept. 2026 - Projet AFNOR"},
  {id:"BT-129",g:"lines",l:"Invoiced quantity",fr:"Quantité facturée",m:true,s:["ei"],t:"Quantity",d:"Nombre d'unités facturées. Négatif autorisé pour les avoirs. Doit avoir le code unité BT-130. Précision décimale : jusqu'à 4 décimales.",r:"BR-22",ex:"10"},
  {id:"BT-130",g:"lines",l:"Unit of measure code",fr:"Unité de mesure",m:true,s:["ei"],t:"Code",d:"UN/ECE Rec 20. Codes courants : C62=Unité/pièce, HUR=Heure, DAY=Jour, MON=Mois, ANN=Année, KGM=Kilogramme, GRM=Gramme, MTR=Mètre, MTK=m², LTR=Litre, KWH=kWh, MTQ=m³.",r:"BR-23",ex:"HUR"},
  {id:"BT-131",g:"lines",l:"Invoice line net amount",fr:"Montant net ligne",m:true,s:["ei"],t:"Amount",d:"Montant net = (BT-148 prix brut − BT-147 remise ligne) × BT-129 quantité. E-Reporting ne nécessite PAS le détail des lignes. Somme de tous les BT-131 = BT-106.",r:"BR-24",ex:"500.00"},

const SXML=`<?xml version="1.0" encoding="UTF-8"?><Invoice xmlns="urn:oasis:names:specification:ubl:schema:xsd:Invoice-2" xmlns:cac="urn:oasis:names:specification:ubl:schema:xsd:CommonAggregateComponents-2" xmlns:cbc="urn:oasis:names:specification:ubl:schema:xsd:CommonBasicComponents-2"><cbc:CustomizationID>urn:cen.eu:en16931:2017</cbc:CustomizationID><cbc:ID>FA-2026-00123</cbc:ID><cbc:IssueDate>2026-09-01</cbc:IssueDate><cbc:InvoiceTypeCode>380</cbc:InvoiceTypeCode><cbc:Note subjectCode="BAR">CHORUS_PRO</cbc:Note><cbc:DocumentCurrencyCode>EUR</cbc:DocumentCurrencyCode><cac:AccountingSupplierParty><cac:Party><cac:PartyLegalEntity><cbc:RegistrationName>Acme France SAS</cbc:RegistrationName><cbc:CompanyID schemeID="0009">12345678900010</cbc:CompanyID></cac:PartyLegalEntity><cac:PartyTaxScheme><cbc:CompanyID>FR12345678900</cbc:CompanyID><cac:TaxScheme><cbc:ID>VAT</cbc:ID></cac:TaxScheme></cac:PartyTaxScheme></cac:Party></cac:AccountingSupplierParty><cac:AccountingCustomerParty><cac:Party><cac:PartyLegalEntity><cbc:RegistrationName>Client Corp SARL</cbc:RegistrationName><cbc:CompanyID schemeID="0009">98765432100024</cbc:CompanyID></cac:PartyLegalEntity></cac:Party></cac:AccountingCustomerParty><cac:TaxTotal><cbc:TaxAmount currencyID="EUR">200.00</cbc:TaxAmount><cac:TaxSubtotal><cbc:TaxableAmount currencyID="EUR">1000.00</cbc:TaxableAmount><cbc:TaxAmount currencyID="EUR">200.00</cbc:TaxAmount><cac:TaxCategory><cbc:ID>S</cbc:ID><cbc:Percent>20</cbc:Percent><cac:TaxScheme><cbc:ID>VAT</cbc:ID></cac:TaxScheme></cac:TaxCategory></cac:TaxSubtotal></cac:TaxTotal><cac:LegalMonetaryTotal><cbc:LineExtensionAmount currencyID="EUR">1000.00</cbc:LineExtensionAmount><cbc:TaxExclusiveAmount currencyID="EUR">1000.00</cbc:TaxExclusiveAmount><cbc:TaxInclusiveAmount currencyID="EUR">1200.00</cbc:TaxInclusiveAmount><cbc:PayableAmount currencyID="EUR">1200.00</cbc:PayableAmount></cac:LegalMonetaryTotal><cac:InvoiceLine><cbc:ID>1</cbc:ID><cbc:InvoicedQuantity unitCode="HUR">20</cbc:InvoicedQuantity><cbc:LineExtensionAmount currencyID="EUR">1000.00</cbc:LineExtensionAmount><cac:Item><cbc:Name>Prestation de conseil</cbc:Name><cac:ClassifiedTaxCategory><cbc:ID>S</cbc:ID><cbc:Percent>20</cbc:Percent><cac:TaxScheme><cbc:ID>VAT</cbc:ID></cac:TaxScheme></cac:ClassifiedTaxCategory></cac:Item><cac:Price><cbc:PriceAmount currencyID="EUR">50.00</cbc:PriceAmount></cac:Price></cac:InvoiceLine></Invoice>`;

function validateXML(xml){
  const errs=[],warns=[],infos=[];
  let doc,fmt="UNKNOWN";
  try{doc=new DOMParser().parseFromString(xml,"application/xml");const pe=doc.querySelector("parseerror");if(pe)return{valid:false,errs:[{r:"PARSE",f:"",m:"XML parse error: "+pe.textContent.substring(0,150)}],warns:[],infos:[],fmt:"INVALID"};}catch(e){return{valid:false,errs:[{r:"PARSE",f:"",m:e.message}],warns:[],infos:[],fmt:"INVALID"};}
  infos.push({r:"PARSE",f:"",m:"XML is well-formed"});
  if(xml.includes("CrossIndustryInvoice")||xml.includes("rsm:"))fmt="CII";
  else if(xml.includes("Invoice-2")||xml.includes("urn:oasis"))fmt="UBL";
  else if(xml.includes("Transmission")&&xml.includes("Entete"))fmt="EREPORTING";
  infos.push({r:"FORMAT",f:"",m:"Format: "+fmt});
  const ns={"cbc":"urn:oasis:names:specification:ubl:schema:xsd:CommonBasicComponents-2","cac":"urn:oasis:names:specification:ubl:schema:xsd:CommonAggregateComponents-2","rsm":"urn:un:unece:uncefact:data:standard:CrossIndustryInvoice:100","ram":"urn:un:unece:uncefact:data:standard:ReusableAggregateBusinessInformationEntity:100","udt":"urn:un:unece:uncefact:data:standard:UnqualifiedDataType:100"};
  const xg=(xp)=>{try{const r=doc.evaluate(xp,doc,p=>ns[p]||null,XPathResult.FIRST_ORDERED_NODE_TYPE,null);return r.singleNodeValue?.textContent?.trim()||null;}catch{return null;}};
  const xa=(xp)=>{try{const it=doc.evaluate(xp,doc,p=>ns[p]||null,XPathResult.ORDERED_NODE_ITERATOR_TYPE,null);const r=[];let n;while((n=it.iterateNext()))r.push(n.textContent.trim());return r;}catch{return[];}};
  if(fmt==="UBL"){
    const spec=xg("//cbc:CustomizationID");if(!spec)errs.push({r:"BR-1",f:"BT-24",m:"Missing CustomizationID (BT-24). Required: urn:cen.eu:en16931:2017"});else infos.push({r:"BR-1",f:"BT-24",m:"BT-24: "+spec});
    const id=xg("//cbc:ID[1]");if(!id)errs.push({r:"BR-2",f:"BT-1",m:"Missing Invoice ID (BT-1)"});else infos.push({r:"BR-2",f:"BT-1",m:"BT-1: "+id});
    const dt=xg("//cbc:IssueDate");if(!dt)errs.push({r:"BR-3",f:"BT-2",m:"Missing IssueDate (BT-2)"});else if(!/^\d{4}-\d{2}-\d{2}$/.test(dt))errs.push({r:"BR-3",f:"BT-2",m:"BT-2 format invalid: "+dt});else infos.push({r:"BR-3",f:"BT-2",m:"BT-2: "+dt});
    const tc=xg("//cbc:InvoiceTypeCode");if(!tc)errs.push({r:"BR-4",f:"BT-3",m:"Missing InvoiceTypeCode (BT-3)"});else if(!["380","381","384","389","394"].includes(tc))warns.push({r:"BR-4",f:"BT-3",m:"BT-3 type code may be invalid: "+tc});else infos.push({r:"BR-4",f:"BT-3",m:"BT-3: "+tc});
    const cur=xg("//cbc:DocumentCurrencyCode");if(!cur)errs.push({r:"BR-5",f:"BT-5",m:"Missing DocumentCurrencyCode (BT-5)"});else infos.push({r:"BR-5",f:"BT-5",m:"BT-5: "+cur});
    const sn=xg("//cac:AccountingSupplierParty//cbc:RegistrationName");if(!sn)errs.push({r:"BR-6",f:"BT-27",m:"Missing Seller RegistrationName (BT-27)"});else infos.push({r:"BR-6",f:"BT-27",m:"Seller: "+sn});
    const ssiret=xg("//cac:AccountingSupplierParty//cac:PartyLegalEntity/cbc:CompanyID");if(!ssiret)errs.push({r:"BR-FR-02",f:"BT-30",m:"AFNOR MANDATORY: Missing Seller SIREN/SIRET (BT-30)"});else{const d=ssiret.replace(/[^0-9]/g,"");if(d.length!==9&&d.length!==14)errs.push({r:"BR-FR-02",f:"BT-30",m:"BT-30 invalid length: "+ssiret});else infos.push({r:"BR-FR-02",f:"BT-30",m:"BT-30: "+ssiret+" ("+(d.length===14?"SIRET":"SIREN")+")"});}
    const svat=xg("//cac:AccountingSupplierParty//cac:PartyTaxScheme/cbc:CompanyID");if(svat)infos.push({r:"BR-CO-9",f:"BT-31",m:"BT-31 Seller VAT: "+svat});
    const bn=xg("//cac:AccountingCustomerParty//cbc:RegistrationName");if(!bn)errs.push({r:"BR-7",f:"BT-44",m:"Missing Buyer RegistrationName (BT-44)"});else infos.push({r:"BR-7",f:"BT-44",m:"Buyer: "+bn});
    const bsiret=xg("//cac:AccountingCustomerParty//cac:PartyLegalEntity/cbc:CompanyID");if(bsiret)infos.push({r:"BR-FR-03",f:"BT-47",m:"BT-47 Buyer SIREN/SIRET: "+bsiret});else warns.push({r:"BR-FR-03",f:"BT-47",m:"BT-47 Buyer SIREN/SIRET missing. Recommended for PPF Annuaire"});
    const bt49=xg("//cac:AccountingCustomerParty//cac:Party/cbc:EndpointID")||xg("//cac:AccountingCustomerParty//cac:PartyIdentification/cbc:ID");
    if(!bt49)warns.push({r:"ANNUAIRE-BT49",f:"BT-49",m:"ANNUAIRE: BT-49 absent. Sans cette adresse le PPF ne peut PAS router la facture → rejet CDAR 211 code AB. Demander à l'acheteur de s'enregistrer dans l'Annuaire PPF via sa PA."});else infos.push({r:"ANNUAIRE-BT49",f:"BT-49",m:"BT-49 Annuaire: "+bt49});
    let barFound=false;try{barFound=!!doc.evaluate("//cbc:Note[@subjectCode='BAR']",doc,null,XPathResult.FIRST_ORDERED_NODE_TYPE,null).singleNodeValue;}catch{}
    if(!barFound)warns.push({r:"BR-FR-20",f:"BT-21/22",m:"AFNOR: No BAR note. Add <cbc:Note subjectCode='BAR'> for e-invoicing scope"});else infos.push({r:"BR-FR-20",f:"BT-21/22",m:"BAR note present"});
    const texcl=xg("//cac:LegalMonetaryTotal/cbc:TaxExclusiveAmount"),tincl=xg("//cac:LegalMonetaryTotal/cbc:TaxInclusiveAmount"),pay=xg("//cac:LegalMonetaryTotal/cbc:PayableAmount"),ttax=xg("//cac:TaxTotal/cbc:TaxAmount");
    if(!texcl)errs.push({r:"BR-14",f:"BT-109",m:"Missing TaxExclusiveAmount (BT-109)"});else infos.push({r:"",f:"BT-109",m:"BT-109 HT: "+texcl});
    if(!tincl)errs.push({r:"BR-CO-15",f:"BT-112",m:"Missing TaxInclusiveAmount (BT-112)"});else infos.push({r:"",f:"BT-112",m:"BT-112 TTC: "+tincl});
    if(!pay)errs.push({r:"BR-CO-16",f:"BT-115",m:"Missing PayableAmount (BT-115)"});else infos.push({r:"",f:"BT-115",m:"BT-115 Due: "+pay});
    if(!ttax)errs.push({r:"BR-CO-14",f:"BT-110",m:"Missing TaxTotal/TaxAmount (BT-110)"});else infos.push({r:"",f:"BT-110",m:"BT-110 VAT: "+ttax});
    if(texcl&&tincl&&ttax){const e=parseFloat(texcl),i=parseFloat(tincl),t=parseFloat(ttax);if(Math.abs((e+t)-i)>0.02)errs.push({r:"BR-CO-15",f:"BT-112",m:"BR-CO-15 FAIL: HT("+e+")+VAT("+t+")="+(e+t).toFixed(2)+" ≠ TTC("+i+")"});else infos.push({r:"BR-CO-15",f:"",m:"Amounts OK: "+e+"+"+t+"="+i});}
    const lines=xa("//cac:InvoiceLine/cbc:ID");if(lines.length===0)errs.push({r:"BR-16",f:"BT-126",m:"No InvoiceLine found"});else{infos.push({r:"",f:"",m:lines.length+" line(s)"});const nm=xa("//cac:InvoiceLine//cbc:Name");if(nm.length<lines.length)errs.push({r:"BR-25",f:"BT-153",m:(lines.length-nm.length)+" line(s) missing Item Name"});}
    const txc=xa("//cac:TaxSubtotal/cac:TaxCategory/cbc:ID");if(txc.length===0)errs.push({r:"BR-CO-18",f:"BT-118",m:"No TaxSubtotal found"});else infos.push({r:"",f:"",m:txc.length+" VAT category(ies): "+txc.join(", ")});
  }else if(fmt==="CII"){
    const spec=xg("//ram:GuidelineSpecifiedDocumentContextParameter/ram:ID");if(!spec)errs.push({r:"BR-1",f:"BT-24",m:"Missing GuidelineSpecifiedDocumentContextParameter/ID"});else infos.push({r:"BR-1",f:"BT-24",m:"BT-24: "+spec});
    const id=xg("//rsm:ExchangedDocument/ram:ID");if(!id)errs.push({r:"BR-2",f:"BT-1",m:"Missing ExchangedDocument/ID (BT-1)"});else infos.push({r:"BR-2",f:"BT-1",m:"BT-1: "+id});
    const sn=xg("//ram:SellerTradeParty/ram:Name");if(!sn)errs.push({r:"BR-6",f:"BT-27",m:"Missing SellerTradeParty/Name"});else infos.push({r:"BR-6",f:"BT-27",m:"Seller: "+sn});
    const ss=xg("//ram:SellerTradeParty/ram:SpecifiedLegalOrganization/ram:ID");if(!ss)errs.push({r:"BR-FR-02",f:"BT-30",m:"AFNOR: Missing Seller SIREN/SIRET in SpecifiedLegalOrganization/ID"});else infos.push({r:"BR-FR-02",f:"BT-30",m:"BT-30: "+ss});
    const bn=xg("//ram:BuyerTradeParty/ram:Name");if(!bn)errs.push({r:"BR-7",f:"BT-44",m:"Missing BuyerTradeParty/Name"});else infos.push({r:"BR-7",f:"BT-44",m:"Buyer: "+bn});
    const total=xg("//ram:SpecifiedTradeSettlementHeaderMonetarySummation/ram:GrandTotalAmount");if(!total)errs.push({r:"BR-CO-15",f:"BT-112",m:"Missing GrandTotalAmount"});else infos.push({r:"",f:"BT-112",m:"TTC: "+total});
  }else if(fmt==="EREPORTING"){
    const tid=xml.match(/<IdentifiantTransmission>(.*?)<\/IdentifiantTransmission>/)?.[1];if(!tid)errs.push({r:"ER-01",f:"ER-01",m:"Missing IdentifiantTransmission"});else infos.push({r:"ER-01",f:"ER-01",m:"ID: "+tid});
    const siret=xml.match(/<SiretDeclarant>(.*?)<\/SiretDeclarant>/)?.[1];if(!siret)errs.push({r:"ER-05",f:"ER-05",m:"Missing SiretDeclarant"});else if(siret.replace(/[^0-9]/g,"").length!==14)errs.push({r:"ER-05",f:"ER-05",m:"SIRET invalid: "+siret});else infos.push({r:"ER-05",f:"ER-05",m:"SIRET: "+siret});
    const pd=xml.match(/<PeriodeDebut>(.*?)<\/PeriodeDebut>/)?.[1],pf=xml.match(/<PeriodeFin>(.*?)<\/PeriodeFin>/)?.[1];
    if(!pd||!pf)errs.push({r:"ER-03",f:"ER-03/04",m:"Missing period dates"});else if(pd>pf)errs.push({r:"ER-03",f:"ER-03/04",m:"Period invalid: start "+pd+" after end "+pf});else infos.push({r:"ER-03",f:"ER-03/04",m:"Period: "+pd+" to "+pf});
    const b2c=(xml.match(/<OperationB2C>/g)||[]).length,intl=(xml.match(/<OperationB2BInternational>/g)||[]).length;
    infos.push({r:"",f:"",m:b2c+" B2C block(s), "+intl+" B2B-INT block(s)"});
  }else{warns.push({r:"FORMAT",f:"",m:"Unknown format. Supported: UBL 2.1, CII/Factur-X, DGFiP e-Reporting XML"});}
  return{valid:errs.length===0,errs,warns,infos,fmt,stats:{e:errs.length,w:warns.length,p:infos.length}};
}

  <button onClick={onClick} style={{fontSize:11,padding:"3px 10px",borderRadius:6,cursor:"pointer",border:"1px solid "+(active?color:"rgba(255,255,255,0.1)"),background:active?color+"20":"transparent",color:active?color:"rgba(255,255,255,0.4)"}}>

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("bt");
  const [grp,setGrp]=useState("all");
  const [q,setQ]=useState("");
  const [sc,setSc]=useState("all");
  const [mf,setMf]=useState("all");
  const [sortBy,setSortBy]=useState("id");
  const [sortDir,setSortDir]=useState("asc");
  const [selBT,setSelBT]=useState(BT[0]);
  const [selER,setSelER]=useState(ER[0]);
  const [selILC,setSelILC]=useState(null);
  const [ilcFam,setIlcFam]=useState('all');
  const [selUC,setSelUC]=useState(null);
  const [ucCat,setUcCat]=useState("all");
  const [xml,setXml]=useState(SXML);
  const [res,setRes]=useState(null);
  const [validating,setValidating]=useState(false);
  const [msgs,setMsgs]=useState([]);
  const [aiIn,setAiIn]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiErr,setAiErr]=useState(null);
  const fileRef=useRef();
  const bottomRef=useRef();
  const inputRef=useRef();

  const filtBT=useMemo(()=>BT.filter(f=>{
    if(grp!=="all"&&f.g!==grp)return false;
    if(sc!=="all"&&!f.s.includes(sc))return false;
    if(mf==="m"&&!f.m)return false;
    if(mf==="o"&&f.m)return false;
    if(q){const s=q.toLowerCase();return f.id.toLowerCase().includes(s)||f.l.toLowerCase().includes(s)||f.fr.toLowerCase().includes(s)||f.d.toLowerCase().includes(s);}
    return true;
  }),[grp,sc,mf,q]);

  const sortedBT=useMemo(()=>[...filtBT].sort((a,b)=>{
    let va,vb;
    if(sortBy==="id"){va=parseInt(a.id.replace(/[^0-9]/g,""))||0;vb=parseInt(b.id.replace(/[^0-9]/g,""))||0;}
    else if(sortBy==="l"){va=a.l.toLowerCase();vb=b.l.toLowerCase();}
    else if(sortBy==="m"){va=a.m?0:1;vb=b.m?0:1;}
    else{va=a[sortBy];vb=b[sortBy];}
    if(va<vb)return sortDir==="asc"?-1:1;
    if(va>vb)return sortDir==="asc"?1:-1;
    return 0;
  }),[filtBT,sortBy,sortDir]);

  const filtUC=useMemo(()=>UC.filter(u=>ucCat==="all"||u.cat===ucCat),[ucCat]);
  const filtILC=useMemo(()=>ILC.filter(s=>ilcFam==="all"||s.famille===ilcFam),[ilcFam]);

  const doVal=useCallback(()=>{setValidating(true);setTimeout(()=>{setRes(validateXML(xml));setValidating(false);},300);},[xml]);

  const sendMsg=useCallback(async(text)=>{
    const t=(text||aiIn).trim();if(!t||aiLoading)return;
    setAiIn("");setAiErr(null);
    const nm=[...msgs,{role:"user",content:t}];
    setMsgs(nm);setAiLoading(true);
    setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),50);
    try{
      const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:SYS,messages:nm})});
      if(!r.ok){const e=await r.json();throw new Error(e?.error?.message||"HTTP "+r.status);}
      const d=await r.json();
      const reply=d.content?.map(b=>b.type==="text"?b.text:"").join("")||"";
      setMsgs(p=>[...p,{role:"assistant",content:reply}]);
    }catch(e){setAiErr(e.message);}
    finally{setAiLoading(false);setTimeout(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});inputRef.current?.focus();},80);}
  },[aiIn,aiLoading,msgs]);

  const ts=(id)=>({padding:"8px 14px",borderRadius:7,cursor:"pointer",fontWeight:600,fontSize:12,background:tab===id?"rgba(99,102,241,0.2)":"transparent",color:tab===id?"#A5B4FC":"rgba(255,255,255,0.4)",border:tab===id?"1px solid rgba(99,102,241,0.4)":"1px solid transparent",transition:"all 0.15s"});
  const sort=(key)=>{if(sortBy===key)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortBy(key);setSortDir("asc");}};

  return (
    <div style={{minHeight:"100vh",background:"#080B14",color:"#E2E8F0",fontFamily:"'DM Sans','Segoe UI',sans-serif",display:"flex",flexDirection:"column"}}>

      {/* HEADER */}
      <div style={{background:"rgba(255,255,255,0.025)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:8,background:"linear-gradient(135deg,#6366F1,#06B6D4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🧾</div>
          <div>
            <div style={{fontFamily:"JetBrains Mono,monospace",fontWeight:800,fontSize:15}}>AFNOR <span style={{color:"#6366F1"}}>XP Z12</span> Suite</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>E-Invoicing · E-Reporting · PA Simulator · France 2026</div>
          </div>
        </div>
        <div style={{display:"flex",gap:2,background:"rgba(0,0,0,0.3)",borderRadius:8,padding:3,marginLeft:"auto",flexWrap:"wrap"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={ts(t.id)}>{t.i} {t.l}</button>)}
        </div>
      </div>

      {/* ── BT FIELDS ── */}
      {tab==="bt"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",flex:1,overflow:"hidden",height:"calc(100vh - 62px)"}}>
          <div style={{borderRight:"1px solid rgba(255,255,255,0.07)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"10px 12px",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0}}>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher un champ BT..." style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,padding:"7px 10px",color:"#fff",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
              <div style={{display:"flex",gap:3,marginTop:7,flexWrap:"wrap"}}>
                {["all","ei","er"].map(v=><P key={v} label={v==="all"?"Tous":v==="ei"?"E-Invoice":"E-Report"} active={sc===v} onClick={()=>setSc(v)}/>)}
                {["all","m","o"].map(v=><P key={v} label={v==="all"?"Tous":v==="m"?"Requis":"Optionnel"} active={mf===v} onClick={()=>setMf(v)} color="#EF4444"/>)}
              </div>
              <div style={{display:"flex",gap:3,marginTop:6,overflowX:"auto",paddingBottom:2}}>
                <button onClick={()=>setGrp("all")} style={{fontSize:10,padding:"2px 8px",borderRadius:5,cursor:"pointer",background:grp==="all"?"rgba(255,255,255,0.1)":"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.5)",whiteSpace:"nowrap"}}>Tous</button>
                {Object.entries(GL).map(([k,v])=>(
                  <button key={k} onClick={()=>setGrp(k)} style={{fontSize:10,padding:"2px 8px",borderRadius:5,cursor:"pointer",background:grp===k?GC[k]+"20":"transparent",border:"1px solid "+(grp===k?GC[k]:"rgba(255,255,255,0.08)"),color:grp===k?GC[k]:"rgba(255,255,255,0.4)",whiteSpace:"nowrap"}}>{v}</button>
                ))}
              </div>
            </div>
            {/* Sort headers */}
            <div style={{display:"grid",gridTemplateColumns:"250px 1fr 72px",padding:"5px 10px",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(0,0,0,0.25)",gap:6,flexShrink:0}}>
              {[["id","Champ BT"],["l","Désignation"],["m","Statut"]].map(([key,label])=>(
                <button key={key} onClick={()=>sort(key)} style={{background:"none",border:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:3,padding:0}}>
                  <span style={{fontSize:10,fontWeight:700,color:sortBy===key?"#A5B4FC":"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:0.7}}>{label}</span>
                  <span style={{fontSize:9,color:sortBy===key?"#A5B4FC":"rgba(255,255,255,0.2)"}}>{sortBy===key?(sortDir==="asc"?"▲":"▼"):"⇅"}</span>
                </button>
              ))}
            </div>
            <div style={{flex:1,overflow:"auto",padding:"3px 6px"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",padding:"4px 6px"}}>{sortedBT.length} champs</div>

                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#6366F1,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🤖</div>
                  <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"3px 12px 12px 12px",padding:"12px 16px",display:"flex",gap:4,alignItems:"center"}}>
                    {[0,1,2].map(d=><div key={d} style={{width:6,height:6,borderRadius:"50%",background:"#6366F1",animation:"b 1.2s infinite",animationDelay:d*0.2+"s"}}/>)}
                  </div>
                </div>
              )}
              {aiErr&&<div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,padding:"10px 14px",fontSize:11,color:"#FCA5A5"}}>Erreur: {aiErr}</div>}
              <div ref={bottomRef}/>
            </div>
            <div style={{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.07)",background:"rgba(0,0,0,0.2)",flexShrink:0}}>
              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <textarea ref={inputRef} value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}} placeholder="Posez votre question... (Entrée pour envoyer)" rows={2} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"9px 12px",color:"#E2E8F0",fontSize:12,outline:"none",resize:"none",lineHeight:1.5,fontFamily:"'DM Sans','Segoe UI',sans-serif"}}/>
                <button onClick={()=>sendMsg()} disabled={aiLoading||!aiIn.trim()} style={{background:aiLoading||!aiIn.trim()?"rgba(99,102,241,0.15)":"linear-gradient(135deg,#6366F1,#3B82F6)",border:"none",borderRadius:8,padding:"10px 16px",color:"#fff",cursor:aiLoading||!aiIn.trim()?"not-allowed":"pointer",fontWeight:700,fontSize:16,height:46,opacity:aiLoading||!aiIn.trim()?0.4:1}}>➤</button>
              </div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",marginTop:4,textAlign:"right"}}>Entrée pour envoyer · Shift+Entrée = nouvelle ligne · Claude Sonnet</div>
            </div>
          </div>
        </div>
      )}

      <style dangerouslySetInnerHTML={{__html:"@keyframes b{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}"}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
