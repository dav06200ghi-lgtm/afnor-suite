                  <div style={{fontSize:13,fontWeight:800,color,marginBottom:en?4:10}}>{title}</div>
                  {en&&<div style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontStyle:"italic",marginBottom:10}}>{en}</div>}
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",lineHeight:1.8,whiteSpace:"pre-line",background:"rgba(0,0,0,0.2)",borderRadius:7,padding:10,marginBottom:12}}>{desc}</div>
                  {steps.map((s,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:5,background:"rgba(0,0,0,0.25)",borderRadius:5,padding:"4px 8px",marginBottom:3}}>
                      <span style={{fontFamily:"JetBrains Mono,monospace",fontSize:10,color,minWidth:80,flexShrink:0}}>{s.f}</span>
                      <span style={{color:"rgba(255,255,255,0.2)"}}>-></span>
                      <span style={{fontFamily:"JetBrains Mono,monospace",fontSize:10,color:"#A5B4FC",minWidth:80,flexShrink:0}}>{s.t}</span>
                      <span style={{fontSize:10,color:"rgba(255,255,255,0.55)"}}>{s.m}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>

            <div style={{background:"rgba(99,102,241,0.06)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:12,padding:16,marginBottom:18}}>
              <div style={{fontSize:13,fontWeight:700,color:"#A5B4FC",marginBottom:12}}>Les 3 identifiants d'une facture dans le reseau</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                {[
                  {id:"BT-1",name:"Numero facture vendeur",color:"#10B981",desc:"Attribue par le vendeur. Unique par vendeur et exercice. Ne peut jamais etre reutilise meme apres rejet. Reference dans tous les CDAR ILC.",ex:"FA-2026-00123"},
                  {id:"ID PPF",name:"Identifiant technique PPF",color:"#3B82F6",desc:"Attribue automatiquement par le PPF a la reception. Cle de routage PA <-> PPF <-> PA. Traçabilite bout-en-bout.",ex:"PPF-2026-09-XXXXX"},
                  {id:"CDAR ID",name:"ID message de reponse",color:"#8B5CF6",desc:"Identifiant du CDAR (Confirmation Document Application Response). Reference BT-1 + ID PPF. Permet de savoir a quelle facture correspond chaque reponse.",ex:"CDAR-20260901-XXX"},
                ].map(item=>(
                  <div key={item.id} style={{background:"rgba(0,0,0,0.25)",borderRadius:9,padding:12,border:"1px solid "+item.color+"25"}}>
                    <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:13,fontWeight:800,color:item.color,marginBottom:3}}>{item.id}</div>
                    <div style={{fontSize:11,fontWeight:600,color:"#fff",marginBottom:5}}>{item.name}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",lineHeight:1.5,marginBottom:7}}>{item.desc}</div>
                    <div style={{fontSize:10,color:item.color,fontFamily:"JetBrains Mono,monospace"}}>{item.ex}</div>
                  </div>
                ))}
              </div>
            </div>

            <div>
              <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:"rgba(255,255,255,0.7)"}}>Acteurs de l'ecosysteme</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:10}}>
                {[
                  {n:"PA (Plateforme Agreee)",c:"#6366F1",d:"Anciennement PDP. Plateforme privee certifiee DGFiP. Gere emission, reception, statuts ILC et e-reporting pour les entreprises."},
                  {n:"PPF (Portail Public)",c:"#3B82F6",d:"Annuaire central des destinataires + concentrateur donnees DGFiP. Reçoit tous les flux et route vers les bonnes PA."},
                  {n:"Annuaire PPF",c:"#06B6D4",d:"Repertoire SIRET -> PA referente. Vendeur consulte l'Annuaire pour trouver PA acheteur via BT-49."},
                  {n:"SC (Solution Compatible)",c:"#8B5CF6",d:"Solution non certifiee connectee a une PA via API XP Z12-013. Suffisant pour les PME."},
                  {n:"Chorus Pro",c:"#10B981",d:"Portail B2G historique. Coexiste avec les PA depuis 2026. Obligatoire pour certains marches publics."},
                  {n:"DGFiP",c:"#F59E0B",d:"Recoit les donnees e-reporting et statuts ILC via PPF pour le controle TVA."},
                ].map(a=>(
                  <div key={a.n} style={{background:"rgba(255,255,255,0.02)",border:"1px solid "+a.c+"25",borderRadius:9,padding:12}}>
                    <div style={{fontSize:11,fontWeight:700,color:a.c,marginBottom:5}}>{a.n}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",lineHeight:1.5}}>{a.d}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── EXPERT IA ── */}
      {tab==="ai"&&(
        <div style={{display:"flex",flex:1,overflow:"hidden",flex:1,minHeight:0}}>
          <div style={{width:230,borderRight:"1px solid rgba(255,255,255,0.07)",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
            <div style={{padding:"10px 12px 8px",borderBottom:"1px solid rgba(255,255,255,0.07)",fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:1}}>Questions suggérées</div>
            <div style={{flex:1,overflow:"auto",padding:"8px"}}>
              {SUGG.map((s,i)=>(
                <button key={i} onClick={()=>sendMsg(s)} disabled={aiLoading} style={{width:"100%",textAlign:"left",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:7,padding:"8px 10px",marginBottom:4,cursor:"pointer",color:"rgba(255,255,255,0.6)",fontSize:11,lineHeight:1.4}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(99,102,241,0.12)";e.currentTarget.style.color="#C7D2FE";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.02)";e.currentTarget.style.color="rgba(255,255,255,0.6)";}}>
                  {s}
                </button>
              ))}
            </div>
            <div style={{padding:"8px",borderTop:"1px solid rgba(255,255,255,0.07)"}}>
              <button onClick={()=>setMsgs([])} style={{width:"100%",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:6,padding:"6px",color:"rgba(239,68,68,0.7)",fontSize:10,cursor:"pointer",fontWeight:600}}>🗑 Effacer</button>
            </div>
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"12px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#6366F1,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🤖</div>
              <div><div style={{fontWeight:700,fontSize:13}}>Expert AFNOR XP Z12 — France 2026</div><div style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>E-invoicing · E-reporting · ILC · EN 16931 · BR-FR</div></div>
              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:aiLoading?"#F59E0B":"#22C55E"}}/>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{aiLoading?"En cours...":"Disponible"}</span>
              </div>
            </div>
            <div style={{flex:1,overflow:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
              {msgs.length===0&&(
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:"30px 20px"}}>
                  <div style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#6366F1,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>🤖</div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Expert AFNOR XP Z12-012</div>
                    <div style={{fontSize:12,color:"rgba(255,255,255,0.45)",lineHeight:1.6,maxWidth:400}}>Posez vos questions sur la Réforme Facture Electronique 2026 — champs BT, statuts ILC, e-reporting, règles BR-FR, Annuaire PPF, cas XP Z12-014...</div>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",maxWidth:480}}>
                    {SUGG.slice(0,3).map((s,i)=><button key={i} onClick={()=>sendMsg(s)} style={{background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.25)",borderRadius:20,padding:"6px 12px",color:"#A5B4FC",fontSize:11,cursor:"pointer"}}>{s}</button>)}
                  </div>
                </div>
              )}
              {msgs.map((msg,i)=>{
                const isU=msg.role==="user";
                return(
                  <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",flexDirection:isU?"row-reverse":"row"}}>
                    <div style={{width:30,height:30,borderRadius:"50%",background:isU?"linear-gradient(135deg,#3B82F6,#6366F1)":"linear-gradient(135deg,#6366F1,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{isU?"👤":"🤖"}</div>
                    <div style={{maxWidth:"74%",background:isU?"rgba(99,102,241,0.15)":"rgba(255,255,255,0.04)",border:"1px solid "+(isU?"rgba(99,102,241,0.3)":"rgba(255,255,255,0.08)"),borderRadius:isU?"12px 3px 12px 12px":"3px 12px 12px 12px",padding:"10px 14px"}}>
                      {isU?<div style={{fontSize:12,color:"#E0E7FF",lineHeight:1.6}}>{msg.content}</div>
                      :<div style={{fontSize:12,color:"rgba(255,255,255,0.85)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>
                        {msg.content.split(/(\*\*[^*]+\*\*)/g).map((part,j)=>{
                          if(part.startsWith("**")&&part.endsWith("**"))return<strong key={j} style={{color:"#fff"}}>{part.slice(2,-2)}</strong>;
                          return<span key={j}>{part}</span>;
                        })}
                      </div>}
                    </div>
                  </div>
                );
              })}
              {aiLoading&&(
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#6366F1,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🤖</div>
                  <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"3px 12px 12px 12px",padding:"12px 16px",display:"flex",gap:4,alignItems:"center"}}>
                    {[0,1,2].map(d=><div key={d} style={{width:6,height:6,borderRadius:"50%",background:"#6366F1",animation:"b 1.2s infinite",animationDelay:d*0.2+"s"}}/>)}
                  </div>
                </div>
              )}
              {aiErr&&<div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,padding:"10px 14px",fontSize:11,color:"#FCA5A5",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>⚠️ {aiErr}</div>}
              <div ref={bottomRef}/>
            </div>
            <div style={{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.07)",background:"rgba(0,0,0,0.2)",flexShrink:0}}>
              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <textarea ref={inputRef} value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}} placeholder="Posez votre question... (Entrée pour envoyer)" rows={2} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"9px 12px",color:"#E2E8F0",fontSize:12,outline:"none",resize:"none",lineHeight:1.5,fontFamily:"'DM Sans','Segoe UI',sans-serif"}}/>
                <button onClick={()=>sendMsg()} disabled={aiLoading||!aiIn.trim()} style={{background:aiLoading||!aiIn.trim()?"rgba(99,102,241,0.15)":"linear-gradient(135deg,#6366F1,#3B82F6)",border:"none",borderRadius:8,padding:"10px 16px",color:"#fff",cursor:aiLoading||!aiIn.trim()?"not-allowed":"pointer",fontWeight:700,fontSize:16,height:46,opacity:aiLoading||!aiIn.trim()?0.4:1}}>➤</button>
              </div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",marginTop:4,textAlign:"right"}}>Entrée pour envoyer · Shift+Entrée = nouvelle ligne · Claude Sonnet</div>
            </div>
          </div>
        </div>
      )}

      <style dangerouslySetInnerHTML={{__html:"@keyframes b{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}"}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
