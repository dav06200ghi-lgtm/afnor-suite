  {id:"BT-18",g:"header",l:"Identifiant d'objet facturé",fr:"Identifiant d'objet facturé",m:false,s:["ei"],t:"IDENTIFIANT",d:"Identifiant d'un objet sur lequel sont basés l'article ou les données facturés et qui est indiqué par le Vendeur. Il peut s'agir d'un numéro d'abonnement, d'un numéro de téléphone, d'un compteur, etc., selon le cas. BR-FR : BR-FR-29 BR-FR-30.",r:"",ex:"ABONNEMENT-001",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:AdditionalReferencedDoc"},

  {id:"BT-73",g:"period",l:"Date de début de période de facturation",fr:"Date de début de période de facturation",m:false,s:["ei"],t:"DATE",d:"Date à laquelle commence la période de facturation. Cette date correspond au premier jour de la période. Codelist : AAAA-MM-JJ (format UBL) AAAAMMJJ (format CII). BR-FR : BR-FR-03.",r:"BR-CO-19",ex:"2026-09-01",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:BillingSpecifiedPeriod"},

  {id:"BT-81",g:"payment",l:"Code de type de moyen de paiement",fr:"Code de type de moyen de paiement",m:true,s:["ei"],t:"CODE",d:"Code indiquant le mode selon lequel un paiement doit être ou a été effectué. Les codes de la liste de codes de la donnée 4461 du dictionnaire des données UNTDID [6] doivent être utilisés. Il convient de distinguer les paiements SEPA et les paiements non SEPA, ainsi que les paiements par virement ou transfert, les prélèvements automatiques, les paiements par carte et tout autre moyen.  En particulier, les codes suivants peuvent être utilisés: 10 : Espèces 20 : Chèque 30 : Virement (inclut Viremen",r:"BR-49",ex:"10=Espèces | 20=Chèque | 30=Virement | 48=Carte bancaire | 49=Prélèvement | 57=Virement interne | 58=Virement SEPA (B2B) | 59=Prélèvement SEPA | 97=Netting (UNTDID 4461)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},

  {id:"BT-83",g:"payment",l:"Avis de paiement",fr:"Avis de paiement",m:false,s:["ei"],t:"TEXTE",d:"Valeur textuelle utilisée pour établir un lien entre le paiement et la Facture, émise par le Vendeur. La référence aide le Vendeur à attribuer un paiement entrant au processus de paiement concerné. Lorsqu'une référence de paiement (par exemple, un numéro d'opération) est spécifiée, il convient que le système destinataire indique cette référence lors du paiement. Dans une opération bancaire, cette référence est rappelée au Vendeur dans la zone « note de remise ».",r:"",ex:"FA-2026-00123",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:PaymentReference"},
  {id:"BT-84",g:"payment",l:"Identifiant de compte de paiement",fr:"Identifiant de compte de paiement",m:true,s:["ei"],t:"IDENTIFIANT",d:"Identifiant unique du compte bancaire, domicilié dans un établissement financier, sur lequel il convient que soit effectué le paiement. Exemple : IBAN ou numéro de compte national.",r:"BR-50 BR-61",ex:"FR7612345987650123456789014 (IBAN)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},

  {id:"BT-87",g:"payment",l:"Identifiant de compte de paiement",fr:"Identifiant de compte de paiement",m:true,s:["ei"],t:"TEXTE",d:"Numéro de compte primaire (PAN) de la carte utilisée pour le paiement. Conformément aux exigences générales applicables dans les établissements financiers, il convient qu'une Facture ne comporte jamais l'intégralité du numéro de compte primaire d'une carte, mais seulement les 4 à 6 derniers chiffres.",r:"BR-51",ex:"XXXX XXXX XXXX 1234 (4 derniers chiffres)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},

  {id:"BT-98",g:"allowcharges",l:"Code de motif de la remise au niveau du document",fr:"Code de motif de la remise au niveau du document",m:false,s:["ei"],t:"CODE",d:"Motif de la remise au niveau du document, exprimé sous forme de code. Le Code de motif de la remise au niveau du document et le Motif de la remise au niveau du document doivent indiquer le même motif de remise. Codelist : UNTDID 5189.",r:"BR-33 BR-CO-5 BR-CO-21",ex:"41=Bonus | 42=Autre bonus | 43=Remise fabricant | 44=Remise contrat | 45=Fidélité | 95=Remise (UNTDID 5189)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeAllowanc"},

  {id:"BT-106",g:"amounts",l:"Somme des montants nets des lignes de facture",fr:"Somme des montants nets des lignes de facture",m:true,s:["ei"],t:"MONTANT",d:"Somme du montant net de toutes les lignes de la Facture. BR-FR : BR-FR-DEC-01.",r:"BR-12 BR-CO-10",ex:"950.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-107",g:"amounts",l:"Somme des remises au niveau du document",fr:"Somme des remises au niveau du document",m:false,s:["ei"],t:"MONTANT",d:"Somme de toutes les remises au niveau du document de la Facture. Les remises appliquées au niveau des lignes sont incluses dans le Montant net de ligne de facture utilisé dans la Somme du montant net des lignes de facture. BR-FR : BR-FR-DEC-01.",r:"BR-CO-11",ex:"50.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-108",g:"amounts",l:"Somme des charges ou frais au niveau du document",fr:"Somme des charges ou frais au niveau du document",m:false,s:["ei"],t:"MONTANT",d:"Somme de toutes les charges ou frais au niveau du document de la Facture. Les frais appliqués au niveau des lignes sont inclus dans le Montant net de ligne de facture utilisé dans la Somme du montant net des lignes de facture. BR-FR : BR-FR-DEC-01.",r:"BR-CO-12",ex:"15.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-109",g:"amounts",l:"Montant total de la facture hors TVA",fr:"Montant total de la facture hors TVA",m:true,s:["ei"],t:"MONTANT",d:"Montant total de la Facture, sans la TVA. Le Montant total de la facture hors TVA correspond à la Somme du montant net des lignes de facture, moins la Somme des remises au niveau du document, plus la Somme des charges ou frais au niveau du document. BR-FR : BR-FR-DEC-01.",r:"BR-13 BR-CO-13",ex:"915.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-110",g:"amounts",l:"Montant total de TVA de la facture",fr:"Montant total de TVA de la facture",m:false,s:["ei"],t:"MONTANT",d:"Montant total de la TVA de la Facture. Le Montant total de la facture TVA comprise correspond à la somme de tous les montants de TVA des différents types de TVA. BR-FR : BR-FR-DEC-01.",r:"BR-CO-14",ex:"183.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-111",g:"amounts",l:"Montant total de TVA de la facture exprimée (devise de comptabilisation)",fr:"Montant total de TVA de la facture exprimée (devise de comptabilisation)",m:false,s:["ei"],t:"MONTANT",d:"Montant total de la TVA exprimé dans la devise de comptabilisation acceptée ou exigée dans le pays du Vendeur. Doit être utilisé lorsque la Devise de comptabilisation de la TVA diffère du Code de devise de facturation. La Devise de comptabilisation de la TVA n'est pas utilisée dans le calcul des totaux de la Facture. Les listes de devises valides sont enregistrées auprès de l'Agence de maintenance de la norme ISO 4217 « Codes pour la représentation des monnaies et types de fonds ». Il est recomm",r:"BR-53",ex:"183.00 EUR",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-112",g:"amounts",l:"Montant total de la Facture, avec la TVA.",fr:"Montant total de la Facture, avec la TVA.",m:true,s:["ei"],t:"MONTANT",d:"Montant total de la Facture, avec la TVA. Le Montant total de la facture avec TVA comprise correspond au Montant total de la facture hors TVA auquel s'ajoute le Montant total de la facture TVA comprise. Le Montant total de la facture avec TVA comprise doit être supérieur ou égal à zéro. BR-FR : BR-FR-DEC-01.",r:"BR-14 BR-CO-15",ex:"1098.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-113",g:"amounts",l:"Montant payé",fr:"Montant payé",m:false,s:["ei"],t:"MONTANT",d:"Somme des montants qui ont été payés par anticipation. Ce montant est soustrait du montant total de la facture avec la TVA pour calculer le montant dû pour le paiement. BR-FR : BR-FR-DEC-01.",r:"",ex:"200.00 (acompte versé)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-114",g:"amounts",l:"Montant arrondi",fr:"Montant arrondi",m:false,s:["ei"],t:"MONTANT",d:"Montant à ajouter au montant total de la facture pour arrondir le montant à payer. BR-FR : BR-FR-DEC-01.",r:"",ex:"0.02",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-115",g:"amounts",l:"Montant à payer",fr:"Montant à payer",m:true,s:["ei"],t:"MONTANT",d:"Encours dont le paiement est demandé. Ce montant correspond au Montant total de la facture avec TVA comprise, moins le Montant payé qui a été payé par anticipation. Ce montant est égal à zéro si la Facture a été entièrement payée. Il est négatif si le Montant payé est supérieur au Montant total de la facture avec TVA comprise. BR-FR : BR-FR-DEC-01.",r:"BR-15 BR-CO-16",ex:"898.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-116",g:"vat",l:"Base d'imposition du type de TVA",fr:"Base d'imposition du type de TVA",m:true,s:["ei"],t:"MONTANT",d:"Somme de tous les montants imposables assujettis à un code et à un taux de type de TVA spécifiques (si le Taux de type de TVA est applicable). Somme du montant net des lignes de facture, moins les remises plus les charges ou frais au niveau du document qui sont assujettis à un code et à un taux de type de TVA spécifiques (si le Taux de type de TVA est applicable). BR-FR : BR-FR-DEC-01.",r:"BR-45",ex:"915.00 (base à 20%)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram"},
  {id:"BT-117",g:"vat",l:"Montant de la TVA pour chaque type de TVA",fr:"Montant de la TVA pour chaque type de TVA",m:true,s:["ei"],t:"MONTANT",d:"Montant total de la TVA pour un type donné de TVA. S'obtient en multipliant la Base d'imposition du type de TVA par le Taux de type de TVA du type correspondant. BR-FR : BR-FR-DEC-01.",r:"BR-46 BR-CO-17",ex:"183.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram"},
  {id:"BT-118",g:"vat",l:"Code de type de TVA",fr:"Code de type de TVA",m:true,s:["ei"],t:"CODE",d:"Identification codée d’un type de TVA. Les entrées suivantes de l'UNTDID 5305 [6] sont utilisées: S = Taux de TVA standard Z = Taux de TVA égal à 0 E = Exempté de TVA AE = Autoliquidation de TVA K =  Exonération pour cause de livraison intracommunautaire G = Exempté de TVA pour Export hors UE O = Hors du périmètre d'application de la TVA L = Îles Canaries M = Ceuta et Melilla BR-FR : BR-FR-15.",r:"BR-47",ex:"S=Standard | E=Exonéré | AE=Autoliquidation (art.283 CGI) | K=Livraison intra-UE (art.262 ter) | G=Export (art.262) | O=Hors champ | Z=Franchise (art.293B) — L/M exclus (BR-FR-15) (UNTDID 5305)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram"},
  {id:"BT-119",g:"vat",l:"Taux de type de TVA",fr:"Taux de type de TVA",m:false,s:["ei"],t:"POURCENTAGE",d:"Taux de TVA, exprimé sous forme de pourcentage, applicable au type de TVA correspondant. Le Code de type de TVA et le Taux de type de TVA doivent être cohérents. BR-FR : BR-FR-16 BR-FR-DEC-04.",r:"BR-48",ex:"20.00 | 10.00 | 5.50 | 7.00 | 8.50 | 2.10 | 13.00 | 0.00 (BR-FR-16)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram"},
  {id:"BT-120",g:"vat",l:"Motif d'exonération de la TVA",fr:"Motif d'exonération de la TVA",m:false,s:["ei"],t:"TEXTE",d:"Énoncé expliquant pourquoi un montant est exonéré de TVA. Articles 226 items 11 to 15 Directive 2006/112/EN",r:"",ex:"TVA non applicable - art. 293 B du CGI | Autoliquidation - art. 283 CGI | Exonération - art. 262 ter CGI | Exonération export - art. 262 CGI",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram"},
  {id:"BT-121",g:"vat",l:"Code de motif d'exonération de la TVA",fr:"Code de motif d'exonération de la TVA",m:false,s:["ei"],t:"CODE",d:"Code expliquant pourquoi un montant est exonéré de TVA. Liste de codes issue et maintenue par le CEF+P317 Codelist : EN16931 Codelists.",r:"",ex:"VATEX-EU-138=Livraison intra-UE | VATEX-EU-146=Export UE | VATEX-EU-132=Exonération art.132 | VATEX-FR-FRANCHISE=Franchise FR | VATEX-EU-79-C=Art.79c | VATEX-EU-148=Transport international",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram"},
  {id:"BT-122",g:"docs",l:"Référence de document justificatif",fr:"Référence de document justificatif",m:true,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identifiant du document justificatif.",r:"BR-52",ex:"BL-2026-00123",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:AdditionalReferencedDoc"},
  {id:"BT-123",g:"docs",l:"Description de document justificatif",fr:"Description de document justificatif",m:false,s:["ei"],t:"TEXTE",d:"Description du document justificatif. Exemple : feuille de temps, rapport d'utilisation, etc. BR-FR : BR-FR-17 BR-FR-18.",r:"",ex:"Bon de livraison | Feuille de temps | Rapport",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:AdditionalReferencedDoc"},
  {id:"BT-124",g:"docs",l:"Emplacement de document externe",fr:"Emplacement de document externe",m:false,s:["ei"],t:"TEXTE",d:"Adresse URL (Uniform Resource Locator) qui identifie l’emplacement du document externe. Moyen de localiser la ressource en décrivant son mécanisme d'accès primaire, par exemple http:// ou ftp://. L'Emplacement de document externe doit être utilisé si l'Acheteur exige des informations supplémentaires étayant la facture.",r:"",ex:"https://docs.acme.fr/bl-2026-00123.pdf",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:AdditionalReferencedDoc"},
  {id:"BT-125",g:"docs",l:"Document joint",fr:"Document joint",m:false,s:["ei"],t:"OBJET BIN",d:"Document annexe intégré sous forme d'objet binaire. Le Document joint est utilisé lorsque de la documentation doit être stockée avec la Facture à des fins de référence ultérieure ou d'audit.",r:"",ex:"[Contenu binaire encodé base64]",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:AdditionalReferencedDoc"},
  {id:"BT-126",g:"lines",l:"Identifiant de ligne de facture",fr:"Identifiant de ligne de facture",m:true,s:["ei"],t:"IDENTIFIANT",d:"Identifiant unique d'une ligne au sein de la Facture.",r:"BR-21",ex:"1 | 2 | 3",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:AssociatedDocumentLin"},
  {id:"BT-127",g:"lines",l:"Note de ligne de facture",fr:"Note de ligne de facture",m:false,s:["ei"],t:"TEXTE",d:"Commentaire fournissant des informations non structurées concernant la ligne de Facture.",r:"",ex:"Période sept. 2026 | Référence interne",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:AssociatedDocumentLin"},
  {id:"BT-128",g:"lines",l:"Identifiant d'objet de ligne de facture",fr:"Identifiant d'objet de ligne de facture",m:false,s:["ei"],t:"IDENTIFIANT",d:"Identifiant d'un objet sur lequel la ligne de facturation est basée, attribué par le vendeur. Il peut s'agir d'un numéro d'abonnement, d'un numéro de téléphone, d'un compteur, etc., selon le cas. BR-FR : BR-FR-29 BR-FR-30 BR-FR-MV-03 BR-FR-MV-05 BR-FR-MV-07 BR-FR-MV-08 BR-FR-MV-11 BR-FR-MV-12.",r:"",ex:"ABONNEMENT-001 | COMPTEUR-12345678",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-129",g:"lines",l:"Quantité facturée",fr:"Quantité facturée",m:true,s:["ei"],t:"QUANTITE",d:"Quantité d'articles (biens ou services) prise en compte dans la ligne de Facture. BR-FR : BR-FR-DEC-02.",r:"BR-22",ex:"10 | 2.5 | -1 (retour)",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeDel"},
  {id:"BT-130",g:"lines",l:"Code de l'unité de mesure de la quantité facturée",fr:"Code de l'unité de mesure de la quantité facturée",m:true,s:["ei"],t:"CODE",d:"Unité de mesure applicable à la quantité facturée. Il convient que les unités de mesure soient exprimées selon les termes de la Recommandation UN/ECE N ° 20 « Codes des unités de mesure utilisées dans le commerce international » [7], par exemple « KGM » pour kilogramme. Codelist : EN16931 Codelists.",r:"BR-23",ex:"C62=Pièce | HUR=Heure | DAY=Jour | MON=Mois | ANN=Année | KGM=Kg | GRM=Gramme | MTR=Mètre | MTK=m² | MTQ=m³ | LTR=Litre | KWH=kWh | TNE=Tonne | SET=Ensemble (UN/ECE Rec.20)",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeDel"},
  {id:"BT-131",g:"lines",l:"Montant net de ligne de facture",fr:"Montant net de ligne de facture",m:true,s:["ei"],t:"MONTANT",d:"Montant total de la ligne de Facture. Ce montant est « net » hors TVA, c'est-à-dire qu'il inclut des remises et charges ou frais au niveau de la ligne ainsi que des autres taxes afférentes. BR-FR : BR-FR-DEC-01 BR-FR-MV-10.",r:"BR-24",ex:"500.00",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-132",g:"lines",l:"Référence de ligne de bon de commande référencée",fr:"Référence de ligne de bon de commande référencée",m:false,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identifiant d'une ligne d'un bon de commande référencée, généré par l'Acheteur. L'Identifiant de bon de commande est référencé au niveau du document.",r:"",ex:"10 (numéro de ligne BC)",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeAgr"},
  {id:"BT-133",g:"lines",l:"Référence comptable de l'acheteur de la ligne de facture",fr:"Référence comptable de l'acheteur de la ligne de facture",m:false,s:["ei"],t:"TEXTE",d:"Valeur textuelle spécifiant où imputer les données pertinentes dans les comptes comptables de l'Acheteur. Si nécessaire, cette référence doit être fournie par l'Acheteur au Vendeur avant émission de la Facture.",r:"",ex:"CC-MKTG-2026",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-134",g:"lines",l:"Date de début de période de facturation d'une ligne",fr:"Date de début de période de facturation d'une ligne",m:false,s:["ei"],t:"DATE",d:"Date à laquelle la période de facturation commence pour cette ligne de Facture. Cette date correspond au premier jour de la période. Codelist : AAAA-MM-JJ (format UBL) AAAAMMJJ (format CII).",r:"BR-CO-20",ex:"2026-09-01",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-135",g:"lines",l:"Date de fin de période de facturation d'une ligne",fr:"Date de fin de période de facturation d'une ligne",m:false,s:["ei"],t:"DATE",d:"Date à laquelle la période de facturation se termine pour cette ligne de Facture. Cette date correspond au dernier jour de la période. Codelist : AAAA-MM-JJ (format UBL) AAAAMMJJ (format CII). BR-FR : BR-FR-03.",r:"BR-30 BR-CO-20",ex:"2026-09-30",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-136",g:"line_allowcharges",l:"Montant d'une remise, hors TVA",fr:"Montant d'une remise, hors TVA",m:true,s:["ei"],t:"MONTANT",d:"Montant d'une remise, hors TVA. BR-FR : BR-FR-DEC-01.",r:"BR-41",ex:"25.00",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-137",g:"line_allowcharges",l:"Assiette de la remise de ligne de facture",fr:"Assiette de la remise de ligne de facture",m:false,s:["ei"],t:"MONTANT",d:"Montant de base pouvant être utilisé conjointement avec le Pourcentage de remise applicable à la ligne de facture pour calculer le Montant de la remise applicable à la ligne de facture. BR-FR : BR-FR-DEC-01.",r:"",ex:"500.00",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-138",g:"line_allowcharges",l:"Pourcentage de remise de ligne de facture",fr:"Pourcentage de remise de ligne de facture",m:false,s:["ei"],t:"POURCENTAGE",d:"Pourcentage pouvant être utilisé conjointement avec l'Assiette de la remise applicable à la ligne de facture pour calculer le Montant de la remise applicable à la ligne de facture.",r:"",ex:"5.00",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-139",g:"line_allowcharges",l:"Motif de la remise de ligne de facture",fr:"Motif de la remise de ligne de facture",m:false,s:["ei"],t:"TEXTE",d:"Motif de la remise applicable à la ligne de Facture, exprimé sous forme de texte.",r:"BR-42 BR-CO-7 BR-CO-23",ex:"Remise quantité",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-140",g:"line_allowcharges",l:"Code de motif de la remise de ligne de facture",fr:"Code de motif de la remise de ligne de facture",m:false,s:["ei"],t:"CODE",d:"Motif de la remise applicable à la ligne de Facture, exprimé sous forme de code. Voir liste de code UNTDID5189.  Le Code de motif de la remise applicable à la ligne de facture et le Motif de la remise applicable à la ligne de facture doivent indiquer le même motif de remise. Codelist : UNTDID 5189.",r:"BR-42 BR-CO-7 BR-CO-23",ex:"41=Bonus | 42=Autre bonus | 44=Contrat | 45=Fidélité | 95=Remise (UNTDID 5189)",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-141",g:"line_allowcharges",l:"Montant des charges ou frais",fr:"Montant des charges ou frais",m:true,s:["ei"],t:"MONTANT",d:"Montant de frais, hors TVA. BR-FR : BR-FR-DEC-01.",r:"BR-43",ex:"10.00",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-142",g:"line_allowcharges",l:"Assiette des charges ou frais applicables à la ligne de facture",fr:"Assiette des charges ou frais applicables à la ligne de facture",m:false,s:["ei"],t:"MONTANT",d:"Montant de base pouvant être utilisé conjointement avec le Pourcentage de charges et frais applicable à la ligne de facture pour calculer le Montant des charges et frais applicables à la ligne de facture. BR-FR : BR-FR-DEC-01.",r:"",ex:"500.00",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},

    const tc=xg("//cbc:InvoiceTypeCode");if(!tc)errs.push({r:"BR-4",f:"BT-3",m:"Missing InvoiceTypeCode (BT-3)"});else if(!["380","381","384","389","394"].includes(tc))warns.push({r:"BR-4",f:"BT-3",m:"BT-3 type code may be invalid: "+tc});else infos.push({r:"BR-4",f:"BT-3",m:"BT-3: "+tc});
    const cur=xg("//cbc:DocumentCurrencyCode");if(!cur)errs.push({r:"BR-5",f:"BT-5",m:"Missing DocumentCurrencyCode (BT-5)"});else infos.push({r:"BR-5",f:"BT-5",m:"BT-5: "+cur});
    const sn=xg("//cac:AccountingSupplierParty//cbc:RegistrationName");if(!sn)errs.push({r:"BR-6",f:"BT-27",m:"Missing Seller RegistrationName (BT-27)"});else infos.push({r:"BR-6",f:"BT-27",m:"Seller: "+sn});
    const ssiret=xg("//cac:AccountingSupplierParty//cac:PartyLegalEntity/cbc:CompanyID");if(!ssiret)errs.push({r:"BR-FR-02",f:"BT-30",m:"AFNOR MANDATORY: Missing Seller SIREN/SIRET (BT-30)"});else{const d=ssiret.replace(/[^0-9]/g,"");if(d.length!==9&&d.length!==14)errs.push({r:"BR-FR-02",f:"BT-30",m:"BT-30 invalid length: "+ssiret});else infos.push({r:"BR-FR-02",f:"BT-30",m:"BT-30: "+ssiret+" ("+(d.length===14?"SIRET":"SIREN")+")"});}
    const svat=xg("//cac:AccountingSupplierParty//cac:PartyTaxScheme/cbc:CompanyID");if(svat)infos.push({r:"BR-CO-9",f:"BT-31",m:"BT-31 Seller VAT: "+svat});
    const bn=xg("//cac:AccountingCustomerParty//cbc:RegistrationName");if(!bn)errs.push({r:"BR-7",f:"BT-44",m:"Missing Buyer RegistrationName (BT-44)"});else infos.push({r:"BR-7",f:"BT-44",m:"Buyer: "+bn});
    const bsiret=xg("//cac:AccountingCustomerParty//cac:PartyLegalEntity/cbc:CompanyID");if(bsiret)infos.push({r:"BR-FR-03",f:"BT-47",m:"BT-47 Buyer SIREN/SIRET: "+bsiret});else warns.push({r:"BR-FR-03",f:"BT-47",m:"BT-47 Buyer SIREN/SIRET missing. Recommended for PPF Annuaire"});
    const bt49=xg("//cac:AccountingCustomerParty//cac:Party/cbc:EndpointID")||xg("//cac:AccountingCustomerParty//cac:PartyIdentification/cbc:ID");
    if(!bt49)warns.push({r:"ANNUAIRE-BT49",f:"BT-49",m:"ANNUAIRE: BT-49 absent. Sans cette adresse le PPF ne peut PAS router la facture → rejet CDAR 211 code AB. Demander à l'acheteur de s'enregistrer dans l'Annuaire PPF via sa PA."});else infos.push({r:"ANNUAIRE-BT49",f:"BT-49",m:"BT-49 Annuaire: "+bt49});
    let barFound=false;try{barFound=!!doc.evaluate("//cbc:Note[@subjectCode='BAR']",doc,null,XPathResult.FIRST_ORDERED_NODE_TYPE,null).singleNodeValue;}catch{}
    if(!barFound)warns.push({r:"BR-FR-20",f:"BT-21/22",m:"AFNOR: No BAR note. Add <cbc:Note subjectCode='BAR'> for e-invoicing scope"});else infos.push({r:"BR-FR-20",f:"BT-21/22",m:"BAR note present"});
    const texcl=xg("//cac:LegalMonetaryTotal/cbc:TaxExclusiveAmount"),tincl=xg("//cac:LegalMonetaryTotal/cbc:TaxInclusiveAmount"),pay=xg("//cac:LegalMonetaryTotal/cbc:PayableAmount"),ttax=xg("//cac:TaxTotal/cbc:TaxAmount");
    if(!texcl)errs.push({r:"BR-14",f:"BT-109",m:"Missing TaxExclusiveAmount (BT-109)"});else infos.push({r:"",f:"BT-109",m:"BT-109 HT: "+texcl});
    if(!tincl)errs.push({r:"BR-CO-15",f:"BT-112",m:"Missing TaxInclusiveAmount (BT-112)"});else infos.push({r:"",f:"BT-112",m:"BT-112 TTC: "+tincl});
    if(!pay)errs.push({r:"BR-CO-16",f:"BT-115",m:"Missing PayableAmount (BT-115)"});else infos.push({r:"",f:"BT-115",m:"BT-115 Due: "+pay});
    if(!ttax)errs.push({r:"BR-CO-14",f:"BT-110",m:"Missing TaxTotal/TaxAmount (BT-110)"});else infos.push({r:"",f:"BT-110",m:"BT-110 VAT: "+ttax});
    if(texcl&&tincl&&ttax){const e=parseFloat(texcl),i=parseFloat(tincl),t=parseFloat(ttax);if(Math.abs((e+t)-i)>0.02)errs.push({r:"BR-CO-15",f:"BT-112",m:"BR-CO-15 FAIL: HT("+e+")+VAT("+t+")="+(e+t).toFixed(2)+" ≠ TTC("+i+")"});else infos.push({r:"BR-CO-15",f:"",m:"Amounts OK: "+e+"+"+t+"="+i});}
    const lines=xa("//cac:InvoiceLine/cbc:ID");if(lines.length===0)errs.push({r:"BR-16",f:"BT-126",m:"No InvoiceLine found"});else{infos.push({r:"",f:"",m:lines.length+" line(s)"});const nm=xa("//cac:InvoiceLine//cbc:Name");if(nm.length<lines.length)errs.push({r:"BR-25",f:"BT-153",m:(lines.length-nm.length)+" line(s) missing Item Name"});}
    const txc=xa("//cac:TaxSubtotal/cac:TaxCategory/cbc:ID");if(txc.length===0)errs.push({r:"BR-CO-18",f:"BT-118",m:"No TaxSubtotal found"});else infos.push({r:"",f:"",m:txc.length+" VAT category(ies): "+txc.join(", ")});
  }else if(fmt==="CII"){
    const spec=xg("//ram:GuidelineSpecifiedDocumentContextParameter/ram:ID");if(!spec)errs.push({r:"BR-1",f:"BT-24",m:"Missing GuidelineSpecifiedDocumentContextParameter/ID"});else infos.push({r:"BR-1",f:"BT-24",m:"BT-24: "+spec});
    const id=xg("//rsm:ExchangedDocument/ram:ID");if(!id)errs.push({r:"BR-2",f:"BT-1",m:"Missing ExchangedDocument/ID (BT-1)"});else infos.push({r:"BR-2",f:"BT-1",m:"BT-1: "+id});
    const sn=xg("//ram:SellerTradeParty/ram:Name");if(!sn)errs.push({r:"BR-6",f:"BT-27",m:"Missing SellerTradeParty/Name"});else infos.push({r:"BR-6",f:"BT-27",m:"Seller: "+sn});
    const ss=xg("//ram:SellerTradeParty/ram:SpecifiedLegalOrganization/ram:ID");if(!ss)errs.push({r:"BR-FR-02",f:"BT-30",m:"AFNOR: Missing Seller SIREN/SIRET in SpecifiedLegalOrganization/ID"});else infos.push({r:"BR-FR-02",f:"BT-30",m:"BT-30: "+ss});
    const bn=xg("//ram:BuyerTradeParty/ram:Name");if(!bn)errs.push({r:"BR-7",f:"BT-44",m:"Missing BuyerTradeParty/Name"});else infos.push({r:"BR-7",f:"BT-44",m:"Buyer: "+bn});
    const total=xg("//ram:SpecifiedTradeSettlementHeaderMonetarySummation/ram:GrandTotalAmount");if(!total)errs.push({r:"BR-CO-15",f:"BT-112",m:"Missing GrandTotalAmount"});else infos.push({r:"",f:"BT-112",m:"TTC: "+total});
  }else if(fmt==="EREPORTING"){
    const tid=xml.match(/<IdentifiantTransmission>(.*?)<\/IdentifiantTransmission>/)?.[1];if(!tid)errs.push({r:"ER-01",f:"ER-01",m:"Missing IdentifiantTransmission"});else infos.push({r:"ER-01",f:"ER-01",m:"ID: "+tid});
    const siret=xml.match(/<SiretDeclarant>(.*?)<\/SiretDeclarant>/)?.[1];if(!siret)errs.push({r:"ER-05",f:"ER-05",m:"Missing SiretDeclarant"});else if(siret.replace(/[^0-9]/g,"").length!==14)errs.push({r:"ER-05",f:"ER-05",m:"SIRET invalid: "+siret});else infos.push({r:"ER-05",f:"ER-05",m:"SIRET: "+siret});
    const pd=xml.match(/<PeriodeDebut>(.*?)<\/PeriodeDebut>/)?.[1],pf=xml.match(/<PeriodeFin>(.*?)<\/PeriodeFin>/)?.[1];
    if(!pd||!pf)errs.push({r:"ER-03",f:"ER-03/04",m:"Missing period dates"});else if(pd>pf)errs.push({r:"ER-03",f:"ER-03/04",m:"Period invalid: start "+pd+" after end "+pf});else infos.push({r:"ER-03",f:"ER-03/04",m:"Period: "+pd+" to "+pf});
    const b2c=(xml.match(/<OperationB2C>/g)||[]).length,intl=(xml.match(/<OperationB2BInternational>/g)||[]).length;
    infos.push({r:"",f:"",m:b2c+" B2C block(s), "+intl+" B2B-INT block(s)"});
  }else{warns.push({r:"FORMAT",f:"",m:"Unknown format. Supported: UBL 2.1, CII/Factur-X, DGFiP e-Reporting XML"});}
  return{valid:errs.length===0,errs,warns,infos,fmt,stats:{e:errs.length,w:warns.length,p:infos.length}};
}

          </div>
        </div>
      )}

      {/* ── FLUX DE DONNEES ── */}
      {tab==="flux"&&(
        <div style={{overflow:"auto",padding:"18px 22px",flex:1}}>
          <div style={{maxWidth:980,margin:"0 auto"}}>
            <div style={{marginBottom:20}}><h2 style={{fontFamily:"JetBrains Mono,monospace",fontWeight:800,fontSize:18,margin:0}}>Flux <span style={{color:"#06B6D4"}}>Architecture Y-Model</span></h2><p style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:4}}>Qui envoie quoi à qui — E-Invoicing vs E-Reporting — Acteurs — Identifiants CDAR · <span style={{color:"rgba(255,255,255,0.25)"}}>Who sends what to whom — E-Invoicing vs E-Reporting — Actors — CDAR identifiers</span></p></div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:22}}>
              {[
                {title:"🔵 E-INVOICING (Flux 2)",en:"Structured invoice sent to buyer via PA/PPF",color:"#3B82F6",desc:"Format: UBL 2.1 / CII / Factur-X (norme EN16931)\nDestinataire: L'acheteur via PA/PPF\nContenu: Facture complete avec toutes les lignes\nFrequence: A chaque facture emise\nRetour: Statuts ILC CDAR 200 -> 212",
                 steps:[{f:"Vendeur",t:"PA Vendeur",m:"Facture XML BT-1..BT-153"},{f:"PA Vendeur",t:"PPF",m:"Routage via Annuaire BT-49"},{f:"PPF",t:"PA Acheteur",m:"Livraison + CDAR 200"},{f:"Acheteur",t:"PA",m:"CDAR 203/204/210/212"}]},
                {title:"🟠 E-REPORTING (Flux 7)",en:"Aggregated VAT data sent to DGFiP only",color:"#F59E0B",desc:"Format: XML proprietaire DGFiP (pas EN16931)\nDestinataire: DGFiP uniquement (pas l'acheteur)\nContenu: Montants agreges par taux TVA\nFrequence: Tous les 10 jours\nRetour: Accuse reception DGFiP",
                 steps:[{f:"Vendeur",t:"PA Vendeur",m:"Donnees agreges ER-01..ER-22"},{f:"PA Vendeur",t:"PPF",m:"XML e-reporting DGFiP"},{f:"PPF",t:"DGFiP",m:"Donnees TVA declaration"},{f:"DGFiP",t:"PPF",m:"Accuse de reception"}]}
              ].map(({title,en,color,desc,steps})=>(
                <div key={title} style={{background:"rgba(255,255,255,0.02)",border:"1px solid "+color+"30",borderRadius:12,padding:16}}>
                  <div style={{fontSize:13,fontWeight:800,color,marginBottom:en?4:10}}>{title}</div>
                  {en&&<div style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontStyle:"italic",marginBottom:10}}>{en}</div>}
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",lineHeight:1.8,whiteSpace:"pre-line",background:"rgba(0,0,0,0.2)",borderRadius:7,padding:10,marginBottom:12}}>{desc}</div>
                  {steps.map((s,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:5,background:"rgba(0,0,0,0.25)",borderRadius:5,padding:"4px 8px",marginBottom:3}}>
                      <span style={{fontFamily:"JetBrains Mono,monospace",fontSize:10,color,minWidth:80,flexShrink:0}}>{s.f}</span>
                      <span style={{color:"rgba(255,255,255,0.2)"}}>-></span>
                      <span style={{fontFamily:"JetBrains Mono,monospace",fontSize:10,color:"#A5B4FC",minWidth:80,flexShrink:0}}>{s.t}</span>
                      <span style={{fontSize:10,color:"rgba(255,255,255,0.55)"}}>{s.m}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>

            <div style={{background:"rgba(99,102,241,0.06)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:12,padding:16,marginBottom:18}}>
              <div style={{fontSize:13,fontWeight:700,color:"#A5B4FC",marginBottom:12}}>Les 3 identifiants d'une facture dans le reseau</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                {[
                  {id:"BT-1",name:"Numero facture vendeur",color:"#10B981",desc:"Attribue par le vendeur. Unique par vendeur et exercice. Ne peut jamais etre reutilise meme apres rejet. Reference dans tous les CDAR ILC.",ex:"FA-2026-00123"},
                  {id:"ID PPF",name:"Identifiant technique PPF",color:"#3B82F6",desc:"Attribue automatiquement par le PPF a la reception. Cle de routage PA <-> PPF <-> PA. Traçabilite bout-en-bout.",ex:"PPF-2026-09-XXXXX"},
                  {id:"CDAR ID",name:"ID message de reponse",color:"#8B5CF6",desc:"Identifiant du CDAR (Confirmation Document Application Response). Reference BT-1 + ID PPF. Permet de savoir a quelle facture correspond chaque reponse.",ex:"CDAR-20260901-XXX"},
                ].map(item=>(
                  <div key={item.id} style={{background:"rgba(0,0,0,0.25)",borderRadius:9,padding:12,border:"1px solid "+item.color+"25"}}>
                    <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:13,fontWeight:800,color:item.color,marginBottom:3}}>{item.id}</div>
                    <div style={{fontSize:11,fontWeight:600,color:"#fff",marginBottom:5}}>{item.name}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",lineHeight:1.5,marginBottom:7}}>{item.desc}</div>
                    <div style={{fontSize:10,color:item.color,fontFamily:"JetBrains Mono,monospace"}}>{item.ex}</div>
                  </div>
                ))}
              </div>
            </div>

            <div>
              <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:"rgba(255,255,255,0.7)"}}>Acteurs de l'ecosysteme</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:10}}>
                {[
                  {n:"PA (Plateforme Agreee)",c:"#6366F1",d:"Anciennement PDP. Plateforme privee certifiee DGFiP. Gere emission, reception, statuts ILC et e-reporting pour les entreprises."},
                  {n:"PPF (Portail Public)",c:"#3B82F6",d:"Annuaire central des destinataires + concentrateur donnees DGFiP. Reçoit tous les flux et route vers les bonnes PA."},
                  {n:"Annuaire PPF",c:"#06B6D4",d:"Repertoire SIRET -> PA referente. Vendeur consulte l'Annuaire pour trouver PA acheteur via BT-49."},
                  {n:"SC (Solution Compatible)",c:"#8B5CF6",d:"Solution non certifiee connectee a une PA via API XP Z12-013. Suffisant pour les PME."},
                  {n:"Chorus Pro",c:"#10B981",d:"Portail B2G historique. Coexiste avec les PA depuis 2026. Obligatoire pour certains marches publics."},
                  {n:"DGFiP",c:"#F59E0B",d:"Recoit les donnees e-reporting et statuts ILC via PPF pour le controle TVA."},
                ].map(a=>(
                  <div key={a.n} style={{background:"rgba(255,255,255,0.02)",border:"1px solid "+a.c+"25",borderRadius:9,padding:12}}>
                    <div style={{fontSize:11,fontWeight:700,color:a.c,marginBottom:5}}>{a.n}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",lineHeight:1.5}}>{a.d}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── EXPERT IA ── */}
      {tab==="ai"&&(
        <div style={{display:"flex",flex:1,overflow:"hidden",flex:1,minHeight:0}}>
          <div style={{width:230,borderRight:"1px solid rgba(255,255,255,0.07)",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
            <div style={{padding:"10px 12px 8px",borderBottom:"1px solid rgba(255,255,255,0.07)",fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:1}}>Questions suggérées</div>
            <div style={{flex:1,overflow:"auto",padding:"8px"}}>
              {SUGG.map((s,i)=>(
                <button key={i} onClick={()=>sendMsg(s)} disabled={aiLoading} style={{width:"100%",textAlign:"left",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:7,padding:"8px 10px",marginBottom:4,cursor:"pointer",color:"rgba(255,255,255,0.6)",fontSize:11,lineHeight:1.4}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(99,102,241,0.12)";e.currentTarget.style.color="#C7D2FE";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.02)";e.currentTarget.style.color="rgba(255,255,255,0.6)";}}>
                  {s}
                </button>
              ))}
            </div>
            <div style={{padding:"8px",borderTop:"1px solid rgba(255,255,255,0.07)"}}>
              <button onClick={()=>setMsgs([])} style={{width:"100%",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:6,padding:"6px",color:"rgba(239,68,68,0.7)",fontSize:10,cursor:"pointer",fontWeight:600}}>🗑 Effacer</button>
            </div>
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"12px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#6366F1,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🤖</div>
              <div><div style={{fontWeight:700,fontSize:13}}>Expert AFNOR XP Z12 — France 2026</div><div style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>E-invoicing · E-reporting · ILC · EN 16931 · BR-FR</div></div>
              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:aiLoading?"#F59E0B":"#22C55E"}}/>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{aiLoading?"En cours...":"Disponible"}</span>
              </div>
            </div>
            <div style={{flex:1,overflow:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
              {msgs.length===0&&(
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:"30px 20px"}}>
                  <div style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#6366F1,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>🤖</div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Expert AFNOR XP Z12-012</div>
                    <div style={{fontSize:12,color:"rgba(255,255,255,0.45)",lineHeight:1.6,maxWidth:400}}>Posez vos questions sur la Réforme Facture Electronique 2026 — champs BT, statuts ILC, e-reporting, règles BR-FR, Annuaire PPF, cas XP Z12-014...</div>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",maxWidth:480}}>
                    {SUGG.slice(0,3).map((s,i)=><button key={i} onClick={()=>sendMsg(s)} style={{background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.25)",borderRadius:20,padding:"6px 12px",color:"#A5B4FC",fontSize:11,cursor:"pointer"}}>{s}</button>)}
                  </div>
                </div>
              )}
              {msgs.map((msg,i)=>{
                const isU=msg.role==="user";
                return(
                  <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",flexDirection:isU?"row-reverse":"row"}}>
                    <div style={{width:30,height:30,borderRadius:"50%",background:isU?"linear-gradient(135deg,#3B82F6,#6366F1)":"linear-gradient(135deg,#6366F1,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{isU?"👤":"🤖"}</div>
                    <div style={{maxWidth:"74%",background:isU?"rgba(99,102,241,0.15)":"rgba(255,255,255,0.04)",border:"1px solid "+(isU?"rgba(99,102,241,0.3)":"rgba(255,255,255,0.08)"),borderRadius:isU?"12px 3px 12px 12px":"3px 12px 12px 12px",padding:"10px 14px"}}>
                      {isU?<div style={{fontSize:12,color:"#E0E7FF",lineHeight:1.6}}>{msg.content}</div>
                      :<div style={{fontSize:12,color:"rgba(255,255,255,0.85)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>
                        {msg.content.split(/(\*\*[^*]+\*\*)/g).map((part,j)=>{
                          if(part.startsWith("**")&&part.endsWith("**"))return<strong key={j} style={{color:"#fff"}}>{part.slice(2,-2)}</strong>;
                          return<span key={j}>{part}</span>;
                        })}
                      </div>}
                    </div>
                  </div>
                );
              })}
              {aiLoading&&(
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#6366F1,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🤖</div>
                  <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"3px 12px 12px 12px",padding:"12px 16px",display:"flex",gap:4,alignItems:"center"}}>
                    {[0,1,2].map(d=><div key={d} style={{width:6,height:6,borderRadius:"50%",background:"#6366F1",animation:"b 1.2s infinite",animationDelay:d*0.2+"s"}}/>)}
                  </div>
                </div>
              )}
              {aiErr&&<div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,padding:"10px 14px",fontSize:11,color:"#FCA5A5",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>⚠️ {aiErr}</div>}
              <div ref={bottomRef}/>
            </div>
            <div style={{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.07)",background:"rgba(0,0,0,0.2)",flexShrink:0}}>
              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <textarea ref={inputRef} value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}} placeholder="Posez votre question... (Entrée pour envoyer)" rows={2} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"9px 12px",color:"#E2E8F0",fontSize:12,outline:"none",resize:"none",lineHeight:1.5,fontFamily:"'DM Sans','Segoe UI',sans-serif"}}/>
                <button onClick={()=>sendMsg()} disabled={aiLoading||!aiIn.trim()} style={{background:aiLoading||!aiIn.trim()?"rgba(99,102,241,0.15)":"linear-gradient(135deg,#6366F1,#3B82F6)",border:"none",borderRadius:8,padding:"10px 16px",color:"#fff",cursor:aiLoading||!aiIn.trim()?"not-allowed":"pointer",fontWeight:700,fontSize:16,height:46,opacity:aiLoading||!aiIn.trim()?0.4:1}}>➤</button>
              </div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",marginTop:4,textAlign:"right"}}>Entrée pour envoyer · Shift+Entrée = nouvelle ligne · Claude Sonnet</div>
            </div>
          </div>
        </div>
      )}

      <style dangerouslySetInnerHTML={{__html:"@keyframes b{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}"}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
