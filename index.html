const BT=[
  {id:"BT-1",g:"header",l:"Numéro de facture",fr:"Numéro de facture",m:true,s:["ei"],t:"IDENTIFIANT",d:"Identification unique de la Facture. Numéro séquentiel requis à l'Article 226(2) de la Directive 2006/112/CE [2], pour identifier la Facture de façon unique. Il peut être basé sur une ou plusieurs séries, qui peuvent comporter des caractères alphanumériques. BR-FR : BR-FR-01 BR-FR-02.",r:"BR-2",ex:"FA-2026-00123",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:ExchangedDocument/ram:ID",tt_er:"TT-19",puf_req:"M",puf_path:"Invoice/cbc:ID",puf_note:"The document number must never exceed 20 characters"},
  {id:"BT-2",g:"header",l:"Date d'émission facture initiale / facture rectificative",fr:"Date d'émission facture initiale / facture rectificative",m:true,s:["ei"],t:"DATE",d:"Date à laquelle la Facture a été émise. Codelist : AAAA-MM-JJ (format UBL) AAAAMMJJ (format CII). BR-FR : BR-FR-03.",r:"BR-3",ex:"2026-09-01 (format YYYY-MM-DD en UBL)",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:ExchangedDocument/ram:IssueDateTime/udt:DateTimeString",idoc:"E1EDKT1[TDID=100].ZE1EDKT1.ZEIVCORDATE",vim_field:"new date field — à activer dans VIM",req_sap:true,sap_note:"Date d'émission de la facture originale rectifiée. Nouveau champ VIM à activer. Input direct, sans logique additionnelle.",tt_er:"TT-20",puf_req:"M",puf_path:"Invoice/cbc:IssueDate"},
  {id:"BT-3",g:"header",l:"Code de type de facture",fr:"Code de type de facture",m:true,s:["ei"],t:"CODE",d:"Code spécifiant le type fonctionnel de la Facture. Les factures commerciales et les notes de crédit sont définies selon les entrées issues de la liste UNTDID 1001 [6]. Les autres entrées de la liste UNTDID 1001 [6] concernant des factures ou des notes de crédit spécifiques peuvent être utilisées, le cas échéant. BR-FR : BR-FR-04 BR-FR-CO-08 BR-FR-MV-13.",r:"BR-4",ex:"261=Avoir autofacturé | 262=Avoir remise globale | 380=Facture commerciale | 381=Avoir | 384=Facture rectificative | 386=Facture d'acompte | 389=Autofacture | 393=Facture affacturée | 396=Avoir affacturé | 471=Rectificative autofacturée | 472=Rectificative affacturée | 473=Rectificative autofacturée affacturée | 500=Acompte autofacturé | 501=Autofacture affacturée | 502=Avoir autofacturé affacturé | 503=Avoir d'acompte (BR-FR-04 — 383 n'existe PAS en France)",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:ExchangedDocument/ram:TypeCode",tt_er:"TT-21",puf_req:"M",puf_path:"Invoice/cbc:InvoiceTypeCode",puf_note:"See Document Type Codes",puf_path_note:"When using PUF use the Self-billing indicator described below to indicate the self-billing version"},
  {id:"BT-5",g:"header",l:"Code de devise de la facture",fr:"Code de devise de la facture",m:true,s:["ei"],t:"CODE",d:"Devise dans laquelle tous les montants de la Facture sont exprimés, à l'exception du montant total de la TVA dans la devise de comptabilisation. Une seule devise doit être utilisée dans la Facture, sauf pour le montant total de la TVA dans la devise de comptabilisation. La devise peut être spécifiée pour chaque montant ou au niveau du document, en fonction de la syntaxe utilisée. Les listes de devises valides sont enregistrées auprès de l'Agence de maintenance de la norme ISO 4217 « Codes pour l",r:"BR-5",ex:"EUR | USD | GBP | CHF | JPY | CAD | AUD (ISO 4217)",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:InvoiceCurrencyCode",tt_er:"TT-22",puf_req:"M",puf_path:"Invoice/cbc:DocumentCurrencyCode"},
  {id:"BT-6",g:"header",l:"Code de devise de comptabilisation de la TVA",fr:"Code de devise de comptabilisation de la TVA",m:false,s:["ei"],t:"CODE",d:"Devise utilisée pour la comptabilisation et la déclaration de la TVA, acceptée ou exigée dans le pays du Vendeur. Doit être utilisée pour le montant total de la TVA dans la devise de comptabilisation, lorsque le code de devise de comptabilisation de la TVA diffère du Code de devise de facturation. Les listes de devises valides sont enregistrées auprès de l'Agence de maintenance de la norme ISO 4217 « Codes pour la représentation des monnaies et types de fonds ». Il est recommandé d'utiliser la r",r:"BR-53",ex:"EUR (si devise facture ≠ EUR, ex: USD→EUR pour TVA DGFiP)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:TaxCurrencyCode",puf_req:"CM",puf_path:"Invoice/cbc:TaxCurrencyCode",puf_note:"Generally EUR if the document currency is not EUR."},
  {id:"BT-7",g:"header",l:"Date d'exigibilité de la taxe sur la valeur ajoutée",fr:"Date d'exigibilité de la taxe sur la valeur ajoutée",m:false,s:["ei"],t:"DATE",d:"Date à laquelle la TVA devient imputable pour le Vendeur et pour l'Acheteur dans la mesure où cette date peut être déterminée et diffère de la date d'émission de la facture, conformément à la directive TVA. La date d'exigibilité correspond généralement à la date à laquelle les biens ont été livrés ou les services achevés (fait générateur). Il existe quelques variations. Pour plus d'informations, voir l'Article 226 (7) de la Directive 2006/112/CE du Conseil [2]. Cet élément est requis si la Date",r:"BR-CO-3",ex:"2026-09-01 (YYYY-MM-DD UBL) | 20260901 (YYYYMMDD CII)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram",puf_req:"O",puf_path:"Invoice/cbc:TaxPointDate",puf_note:"Not typically used in France - BT-8 (Tax point date code) is preferred. Mutually exclusive with BT-8."},
  {id:"BT-8",g:"header",l:"Code de date d'exigibilité de la taxe sur la valeur ajoutée",fr:"Code de date d'exigibilité de la taxe sur la valeur ajoutée",m:false,s:["ei"],t:"CODE",d:"Code spécifiant la date à laquelle la TVA devient imputable pour le Vendeur et pour l'Acheteur Le code doit être choisi parmi les valeurs suivantes issues de l'UNTDID 2005 ou 2475 [6]: - Date de la facture - Date de livraison - Date de paiement La date d'exigibilité de la taxe sur la valeur ajoutée en code est utilisé lorsque la date d'exigibilité de la taxe sur la valeur ajoutée n'est pas connue au moment de l'envoi de la facture. L'utilisation du BT-8 est donc exclusive de celle du BT-7 et inv",r:"BR-CO-3",ex:"3=Date facture (TVA sur débits) | 35=Date livraison | 432=Date paiement (TVA sur encaissements) — UNTDID 2005/2475",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram",idoc:"E1EDKT1[TDID=100].ZE1EDKT1.ZEIVTAXPAYOPT",vim_field:"new text field — valeur fournie par Edgar",req_sap:true,sap_note:"Option TVA sur débits vs encaissements. Impact direct sur la détermination TVA SAP et le périmètre e-reporting paiement.",tt_er:"TT-24",puf_req:"CM",puf_path:"Invoice/cac:InvoicePeriod/cbc:DescriptionCode",puf_note:"Mandatory if different from invoice date. Mutually exclusive with BT-7.",puf_path_note:"Valid values are: — 3 - Invoice issue date — 35 - Delivery date — 432 - Paid to date"},
  {id:"BT-9",g:"header",l:"Date d'échéance / Date de versement en cas d'acompte",fr:"Date d'échéance / Date de versement en cas d'acompte",m:false,s:["ei"],t:"DATE",d:"Date à laquelle le paiement est dû. La date d'échéance correspond à la date à laquelle le paiement net est dû. Pour les paiements partiels, il s'agit de la première date d'échéance nette. La description correspondant à des conditions de paiement plus complexes est indiquée dans le BT-20. Codelist : AAAA-MM-JJ (format UBL) AAAAMMJJ (format CII). BR-FR : BR-FR-03 BR-FR-CO-07 BR-FR-CO-09.",r:"BR-CO-25",ex:"2026-10-30",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cgi_upgrade:false,cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradePaymentT",tt_er:"TT-201",puf_req:"CM",puf_path:"Invoice/cbc:DueDate",puf_note:"Mandatory if applicable"},
  {id:"BT-10",g:"header",l:"Référence de l'acheteur",fr:"Référence de l'acheteur",m:false,s:["ei"],t:"TEXTE",d:"Identifiant attribué par l'Acheteur et destiné au routage de la facture en interne. L'identifiant est défini par l'Acheteur (par exemple, ID de contact, service, ID de bureau, code de projet) mais est indiqué par le Vendeur dans la Facture.",r:"",ex:"PO-2026-0055",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:BuyerReference",puf_req:"O",puf_path:"Invoice/cbc:BuyerReference"},
  {id:"BT-11",g:"header",l:"Référence de projet",fr:"Référence de projet",m:false,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identification du projet auquel la facture fait référence",r:"",ex:"PROJ-ERP-2026",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:SpecifiedProcuringProje",puf_req:"O",puf_path:"Invoice/cac:ProjectReference/cbc:ID"},
  {id:"BT-12",g:"header",l:"Référence du contrat",fr:"Référence du contrat",m:false,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identifiant d'un contrat. L'identifiant du contrat devrait être unique pour une relation commerciale spécifique et pour une période de temps définie. BR-FR : BR-FR-CO-03.",r:"",ex:"CTR-2026-001",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:ContractReferencedDocum",puf_req:"O",puf_path:"Invoice/cac:ContractDocumentReference/cbc:ID"},
  {id:"BT-13",g:"header",l:"Référence du bon de commande",fr:"Référence du bon de commande",m:false,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identifiant d'un bon de commande référencé, généré par l'Acheteur.",r:"",ex:"BC-2026-00456",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:BuyerOrderReferencedDoc",puf_req:"CM",puf_path:"Invoice/cac:OrderReference/cbc:ID",puf_note:"When it has been previously established by the buyer"},
  {id:"BT-14",g:"header",l:"Numéro d’ordre de vente",fr:"Numéro d’ordre de vente",m:false,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identifiant d'un bon de commande référencé, généré par le Vendeur.",r:"",ex:"SO-2026-7890",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:SellerOrderReferencedDo",puf_req:"O",puf_path:"Invoice/cac:OrderReference/cbc:SalesOrderID"},
  {id:"BT-15",g:"header",l:"Référence d'avis de réception",fr:"Référence d'avis de réception",m:false,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identifiant d'un avis de réception référencé.",r:"",ex:"GRN-2026-0012",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeDelivery/ram:ReceivingAdviceReference",puf_req:"O",puf_path:"Invoice/cac:ReceiptDocumentReference/cbc:ID"},
  {id:"BT-16",g:"header",l:"Référence d'avis d'expédition",fr:"Référence d'avis d'expédition",m:false,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identifiant d'un avis d'expédition référencé.",r:"",ex:"ASN-2026-0078",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeDelivery/ram:DespatchAdviceReferenced",puf_req:"O",puf_path:"Invoice/cac:DespatchDocumentReference/cbc:ID"},
  {id:"BT-17",g:"header",l:"Référence de l'appel d'offres ou du lot",fr:"Référence de l'appel d'offres ou du lot",m:false,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identifiant d'un appel d'offres ou d'un lot Dans certains pays, une référence à l'appel d'offres qui a abouti au contrat doit être fournie.",r:"",ex:"AO-2025-LOT2",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:AdditionalReferencedDoc",puf_req:"O",puf_path:"Invoice/cac:OriginatorDocumentReference/cbc:ID"},
  {id:"BT-18",g:"header",l:"Identifiant d'objet facturé",fr:"Identifiant d'objet facturé",m:false,s:["ei"],t:"IDENTIFIANT",d:"Identifiant d'un objet sur lequel sont basés l'article ou les données facturés et qui est indiqué par le Vendeur. Il peut s'agir d'un numéro d'abonnement, d'un numéro de téléphone, d'un compteur, etc., selon le cas. BR-FR : BR-FR-29 BR-FR-30.",r:"",ex:"ABONNEMENT-001",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:AdditionalReferencedDoc",puf_req:"O",puf_path:"Invoice/cac:AdditionalDocumentReference/cbc:ID",puf_note:"Used in UC5 for catalog reference",puf_path_note:"When DocumentTypeCode = '50' (catalog)"},
  {id:"BT-19",g:"header",l:"Référence comptable de l'acheteur",fr:"Référence comptable de l'acheteur",m:false,s:["ei"],t:"TEXTE",d:"Valeur textuelle spécifiant où imputer les données pertinentes dans les comptes comptables de l'Acheteur.",r:"",ex:"CC-DSI-2026",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ReceivableSpecifiedTra",puf_req:"O",puf_path:"Invoice/cbc:AccountingCost"},
  {id:"BT-20",g:"header",l:"Conditions de paiement",fr:"Conditions de paiement",m:false,s:["ei"],t:"TEXTE",d:"Description textuelle des conditions de paiement applicables au montant à payer (y compris la description des pénalités éventuelles). Cet élément peut contenir plusieurs lignes et plusieurs termes.",r:"BR-CO-25",ex:"30 jours nets fin de mois",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradePaymentT",puf_req:"M",puf_path:"Invoice/cac:PaymentTerms/cbc:Note"},
  {id:"BT-21",g:"header",l:"Code du sujet de la note de facture",fr:"Code du sujet de la note de facture",m:false,s:["ei"],t:"CODE",d:"Sujet de la note en texte suivant. Uniquement en UBL : entre ## en début de Note de ligne Doit être choisi permi les codes disponibles dans la liste UNTDID 4451 [6]. BR-FR : BR-FR-05 BR-FR-06 BR-FR-20.",r:"",ex:"BAR=Périmètre EI (obligatoire BR-FR-20) | AAK=Régime TVA spécial (franchise, agri) | ACC=Affacturage | DCL=Mandat facturation | TXD=Régime TVA | ZZZ=Texte libre (UNTDID 4451)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:ExchangedDocument/ram:IncludedNote/ram:SubjectCode",tt_er:"TT-26",puf_req:"M",puf_path:"Invoice/cbc:Note",puf_note:"See Text Codes",puf_path_note:"Prepend cbc:Note with '#type#' followed by Note value"},
  {id:"BT-22",g:"header",l:"Note de facture",fr:"Note de facture",m:true,s:["ei"],t:"TEXTE",d:"Commentaire fournissant des informations non structurées concernant la Facture dans son ensemble. Exemple : raison d'une rectification. BR-FR : BR-FR-05 BR-FR-06 BR-FR-20.",r:"",ex:"Commentaire libre. Ex : raison de rectification",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:ExchangedDocument/ram:IncludedNote/ram:Content",tt_er:"TT-27",puf_req:"M",puf_path:"Invoice/cbc:Note"},
  {id:"BT-23",g:"header",l:"Type de processus métier (cadre de facturation)",fr:"Type de processus métier (cadre de facturation)",m:false,s:["ei"],t:"TEXTE",d:"Identifie le contexte de processus métier dans lequel se déroule l'opération. Permet à l'Acheteur de traiter la Facture de manière appropriée. Cadre de facturation à renseigner par le vendeur BR-FR : BR-FR-08 BR-FR-CO-08 BR-FR-CO-09.",r:"",ex:"B1=Facture biens | B2=Facture biens déjà payée | B4=Facture définitive biens (après acompte) | B7=Facture biens e-reporting (TVA déjà collectée) | B8=Facture multi-vendeurs biens | M1=Facture double biens+services | M2=Facture double déjà payée | M4=Facture définitive double | M8=Facture multi-vendeurs double | S1=Facture services | S2=Facture services déjà payée | S3=Sous-traitance paiement direct (B2G) | S4=Facture définitive services (après acompte) | S5=Sous-traitant facture services | S6=Cotraitant facture services | S7=Facture services e-reporting (TVA déjà collectée) | S8=Facture multi-vendeurs services (BR-FR-08 G1.02)",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cgi_upgrade:true,cii:"/rsm:CrossIndustryInvoice/rsm:ExchangedDocumentContext/ram:BusinessProcessSpecifiedDocumentContextParameter/ram:ID",idoc:"E1EDKT1[TDID=100].ZE1EDKT1.ZEIVTRCAT",vim_field:"new — Dictionary field (LB/PS/LBPS)",req_sap:true,sap_note:"Nouveau champ SAP. Valeurs: LB=biens, PS=services, LBPS=mixte. Requis pour distinguer goods vs services → impact TVA et e-reporting.",tt_er:"TT-28",cadre:true,puf_req:"M",puf_path:"Invoice/cbc:InvoiceTypeCode/@name",puf_note:"See Business Process Codes",dual_note:"⚠️ BT-23 a 2 usages dans PUF: (1) ProfileID = valeur technique (ex: urn:pagero.com:puf:billing:1.0) → fourni par Pagero/PA. (2) InvoiceTypeCode @name = Cadre de Facturation (B1/S1/M1...) → fourni par COTY dans SAP (champ ZEIVTRCAT). C'est ce second usage qui alimente TG-10 et TT-28 dans le e-reporti"},
  {id:"BT-24",g:"header",l:"Type de profil (e-invoicing, e-reporting, facture etc..)",fr:"Type de profil (e-invoicing, e-reporting, facture etc..)",m:true,s:["ei"],t:"IDENTIFIANT",d:"Identification de la spécification contenant la totalité des règles concernant le contenu sémantique, les cardinalités et les règles opérationnelles auxquelles se conforment les données contenues dans l’instance de document. Elle identifie la norme de facturation européenne ainsi que les éventuelles extensions appliquées. L'identification peut inclure la version de la spécification.",r:"BR-1",ex:"urn:cen.eu:en16931:2017 | urn:cen.eu:en16931:2017#conformant#urn:fnfe-mpe.org:fr:extended-ctc:1.0",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:ExchangedDocumentContext/ram:GuidelineSpecifiedDocumentContextParameter/ram:ID",tt_er:"TT-29"},
  {id:"BT-25",g:"header",l:"Référence à une facture antérieure",fr:"Référence à une facture antérieure",m:true,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identification d'une Facture précédemment envoyée par le Vendeur. BR-FR : BR-FR-01 BR-FR-02 BR-FR-CO-03 BR-FR-CO-04 BR-FR-CO-05.",r:"BR-55",ex:"FA-2026-00100 (numéro de la facture originale)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:InvoiceReferencedDocum",idoc:"E1EDKT1[TDID=100].ZE1EDKT1.ZEIVCORINV",vim_field:"new field — à créer pour factures rectificatives et avoirs",req_sap:true,sap_note:"Nouveau champ VIM. Référence à la facture originale en cas de rectification ou avoir. Obligatoire pour credit note handling SAP.",tt_er:"TT-30",puf_req:"M",puf_path:"Invoice/cac:BillingReference/cac:InvoiceDocumentReference/cbc:ID",puf_note:"Mandatory in credit/debet note scenarios."},
  {id:"BT-26",g:"header",l:"Date d'émission de facture antérieure",fr:"Date d'émission de facture antérieure",m:false,s:["ei"],t:"DATE",d:"Date à laquelle la Facture antérieure a été émise. La Date d'émission de facture antérieure doit être fournie si l'identifiant de facture antérieure n'est pas unique. Codelist : AAAA-MM-JJ (format UBL) AAAAMMJJ (format CII). BR-FR : BR-FR-03 BR-FR-CO-03 BR-FR-CO-04 BR-FR-CO-05.",r:"",ex:"2026-08-15",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:InvoiceReferencedDocum",tt_er:"TT-31",puf_req:"CM",puf_path:"Invoice/cac:BillingReference/cac:InvoiceDocumentReference/cbc:IssueDate",puf_note:"Mandatory in credit/debet note scenarios."},
  {id:"BT-27",g:"seller",l:"Raison sociale du vendeur",fr:"Raison sociale du vendeur",m:true,s:["ei"],t:"TEXTE",d:"Dénomination officielle complète sous laquelle le Vendeur est inscrit dans le registre national des personnes morales ou en tant qu'Assujetti, ou alors exerce ses activités en tant que personne ou groupe de personnes.",r:"BR-6",ex:"Acme France SAS",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:SellerTradeParty/ram:Na",puf_req:"M",puf_path:"Invoice/cac:AccountingSupplierParty/cac:Party/cac:PartyLegalEntity/cbc:RegistrationName"},
  {id:"BT-28",g:"seller",l:"Appellation commerciale du vendeur",fr:"Appellation commerciale du vendeur",m:false,s:["ei"],t:"TEXTE",d:"Nom sous lequel le Vendeur est connu, autre que la Raison sociale du vendeur (également appelée Dénomination commerciale). Elle peut être utilisée si elle diffère de la Raison sociale du Vendeur.",r:"",ex:"Acme (dénomination commerciale)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:SellerTradeParty/ram:Sp",puf_req:"O",puf_path:"Invoice/cac:AccountingSupplierParty/cac:Party/cac:PartyName/cbc:Name"},
  {id:"BT-29",g:"seller",l:"Identifiant privé du vendeur",fr:"Identifiant privé du vendeur",m:false,s:["ei"],t:"IDENTIFIANT",d:"Identification du Vendeur Dans de nombreux systèmes, l'Identifiant du vendeur est un élément d'information clé. Plusieurs Identifiants de vendeur peuvent être attribués ou spécifiés. Toutefois, tous les identifiants sont spécifiques à un contexte et lorsqu'il y a échange de données entre des systèmes, il est important de les différencier en utilisant un schéma d'identification différent. BR-FR : BR-FR-CO-10 BR-FR-CO-11 BR-FR-09 BR-FR-CO-13 BR-FR-CO-14 BR-FR-CO-15 BR-FR-24 BR-FR-26.",r:"",ex:"0009:12345678900010 (schème ISO 6523)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:SellerTradeParty/ram:Gl",tt_er:"TT-33",puf_req:"CM",puf_path:"Invoice/cac:AccountingSupplierParty/cac:Party/cac:PartyIdentification/cbc:ID[@schemeID = '0009']"},

  {id:"BT-29c",g:"seller",l:"Identifiant du vendeur (routage)",fr:"Identifiant du vendeur (routage)",m:false,s:["ei"],t:"IDENTIFIANT",d:"Identification du vendeur. Dans de nombreux systèmes, l'Identifiant du vendeur est un élément d'information clé. Plusieurs Identifiants de vendeur peuvent être attribués ou spécifiés. Toutefois, tous les identifiants sont spécifiques à un contexte et lorsqu'il y a échange de données entre des systèmes, il est important de les différencier en utilisant un schéma d'identification différent. BR-FR : BR-FR-CO-10 BR-FR-CO-11 BR-FR-24 BR-FR-26.",r:"",ex:"0225:CODE_ROUTAGE",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:SellerTradeParty/ram:Gl"},

  {id:"BT-30",g:"seller",l:"Numéro de SIREN",fr:"Numéro de SIREN",m:false,s:["ei"],t:"IDENTIFIANT",d:"Identifiant délivré par un organisme d’enregistrement officiel, qui identifie le Vendeur comme une entité juridique ou une personne morale. Si aucun schéma d'identification n'est précisé, il devrait être connu de l'Acheteur et du Vendeur. Codelist : SIREN. BR-FR : BR-FR-10.",r:"BR-CO-26",ex:"0002:123456789 (SIREN) | 0009:12345678900010 (SIRET)",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cgi_upgrade:true,cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:SellerTradeParty/ram:Sp",tt_er:"TT-33",puf_req:"M",puf_path:"Invoice/cac:AccountingSupplierParty/cac:Party/cac:PartyLegalEntity/cbc:CompanyID[@schemeID = '0002']"},
  {id:"BT-31",g:"seller",l:"Identifiant à la TVA du vendeur",fr:"Identifiant à la TVA du vendeur",m:false,s:["ei"],t:"IDENTIFIANT",d:"Identifiant à la TVA du Vendeur (également appelé Numéro d'identification à la TVA du vendeur). Selon l'Article 215 de la Directive 2006/112/CE du Conseil [2], le numéro individuel d'identification à la TVA comporte un préfixe conforme à l’ISO 3166-1 alpha-2 permettant d'identifier l'État membre par lequel il a été attribué. Néanmoins, la Grèce est autorisée à utiliser le préfixe « EL ».",r:"BR-CO-9 BR-CO-26",ex:"FR12345678900",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:SellerTradeParty/ram:Sp",tt_er:"TT-33",puf_req:"CM",puf_path:"Invoice/cac:AccountingSupplierParty/cac:Party/cac:PartyTaxScheme[cac:TaxScheme/cbc:ID = 'VAT']/cbc:CompanyID"},
  {id:"BT-32",g:"seller",l:"Identifiant fiscal du vendeur",fr:"Identifiant fiscal du vendeur",m:false,s:["ei"],t:"IDENTIFIANT",d:"Référence permettant au Vendeur d'indiquer qu'il est enregistré auprès de l'administration fiscale. Pour la France, cette donnée ne permet pas de véhiculer le n° de TVA intracommunautaire Cette information peut avoir une incidence sur la façon dont l'Acheteur règle le paiement (notamment en ce qui concerne les cotisations de sécurité sociale). Par exemple, dans certains pays, si le Vendeur n'est pas enregistré comme entité imposable, l'Acheteur est tenu de retenir le montant de la taxe et de le",r:"",ex:"SIREN auto-entrepreneur sans n° TVA",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:SellerTradeParty/ram:Sp"},

  {id:"BT-81",g:"payment",l:"Code de type de moyen de paiement",fr:"Code de type de moyen de paiement",m:true,s:["ei"],t:"CODE",d:"Code indiquant le mode selon lequel un paiement doit être ou a été effectué. Les codes de la liste de codes de la donnée 4461 du dictionnaire des données UNTDID [6] doivent être utilisés. Il convient de distinguer les paiements SEPA et les paiements non SEPA, ainsi que les paiements par virement ou transfert, les prélèvements automatiques, les paiements par carte et tout autre moyen.  En particulier, les codes suivants peuvent être utilisés: 10 : Espèces 20 : Chèque 30 : Virement (inclut Viremen",r:"BR-49",ex:"10=Espèces | 20=Chèque | 30=Virement | 48=Carte bancaire | 49=Prélèvement | 57=Virement interne | 58=Virement SEPA (B2B) | 59=Prélèvement SEPA | 97=Netting (UNTDID 4461)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",puf_req:"M",puf_path:"Invoice/cac:PaymentMeans/cbc:PaymentMeansCode"},
  {id:"BT-82",g:"payment",l:"Libellé du moyen de paiement",fr:"Libellé du moyen de paiement",m:false,s:["ei"],t:"TEXTE",d:"Texte indiquant le mode selon lequel un paiement doit être ou a été effectué. Exemple : espèces, carte de crédit, etc.",r:"",ex:"Virement SEPA",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme"},
  {id:"BT-83",g:"payment",l:"Avis de paiement",fr:"Avis de paiement",m:false,s:["ei"],t:"TEXTE",d:"Valeur textuelle utilisée pour établir un lien entre le paiement et la Facture, émise par le Vendeur. La référence aide le Vendeur à attribuer un paiement entrant au processus de paiement concerné. Lorsqu'une référence de paiement (par exemple, un numéro d'opération) est spécifiée, il convient que le système destinataire indique cette référence lors du paiement. Dans une opération bancaire, cette référence est rappelée au Vendeur dans la zone « note de remise ».",r:"",ex:"FA-2026-00123",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:PaymentReference"},

  {id:"BT-87",g:"payment",l:"Identifiant de compte de paiement",fr:"Identifiant de compte de paiement",m:true,s:["ei"],t:"TEXTE",d:"Numéro de compte primaire (PAN) de la carte utilisée pour le paiement. Conformément aux exigences générales applicables dans les établissements financiers, il convient qu'une Facture ne comporte jamais l'intégralité du numéro de compte primaire d'une carte, mais seulement les 4 à 6 derniers chiffres.",r:"BR-51",ex:"XXXX XXXX XXXX 1234 (4 derniers chiffres)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",puf_req:"M",puf_path:"/Invoice/cac:PaymentMeans/cac:CardAccount/cbc:PrimaryAccountNumberID",puf_note:"Required in Use Cases: UC07"},

  {id:"BT-97",g:"allowcharges",l:"Motif de la remise au niveau du document",fr:"Motif de la remise au niveau du document",m:false,s:["ei"],t:"TEXTE",d:"Motif de la remise au niveau du document, exprimé sous forme de texte.",r:"BR-33 BR-CO-5 BR-CO-21",ex:"Remise commerciale",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeAllowanc",puf_req:"O",puf_path:"Invoice/cac:AllowanceCharge[cbc:ChargeIndicator = 'false']/cbc:AllowanceChargeReason"},
  {id:"BT-98",g:"allowcharges",l:"Code de motif de la remise au niveau du document",fr:"Code de motif de la remise au niveau du document",m:false,s:["ei"],t:"CODE",d:"Motif de la remise au niveau du document, exprimé sous forme de code. Le Code de motif de la remise au niveau du document et le Motif de la remise au niveau du document doivent indiquer le même motif de remise. Codelist : UNTDID 5189.",r:"BR-33 BR-CO-5 BR-CO-21",ex:"41=Bonus | 42=Autre bonus | 43=Remise fabricant | 44=Remise contrat | 45=Fidélité | 95=Remise (UNTDID 5189)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeAllowanc",puf_req:"O",puf_path:"Invoice/cac:AllowanceCharge[cbc:ChargeIndicator = 'false']/cbc:AllowanceChargeReasonCode"},

  {id:"BT-101",g:"allowcharges",l:"Pourcentage de charges ou frais au niveau du document",fr:"Pourcentage de charges ou frais au niveau du document",m:false,s:["ei"],t:"POURCENTAGE",d:"Pourcentage pouvant être utilisé conjointement avec l'Assiette des charges ou frais au niveau du document pour calculer le Montant des charges ou frais au niveau du document.",r:"",ex:"1.50",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeAllowanc",puf_req:"CM",puf_path:"Invoice/cac:AllowanceCharge[cbc:ChargeIndicator = 'true']/cbc:MultiplierFactorNumeric"},
  {id:"BT-102",g:"allowcharges",l:"Code de type de TVA des charges",fr:"Code de type de TVA des charges",m:true,s:["ei"],t:"CODE",d:"Identification codée du type de TVA applicable aux charges ou frais au niveau du document. Les entrées suivantes de l'UNTDID 5305 [6] sont utilisées: S = Taux de TVA standard Z = Taux de TVA égal à 0 E = Exempté de TVA AE = Autoliquidation de TVA K =  Exonération pour cause de livraison intracommunautaire G = Exempté de TVA pour Export hors UE O = Hors du périmètre d'application de la TVA L = Îles Canaries M = Ceuta et Melilla BR-FR : BR-FR-15.",r:"BR-37",ex:"S=Standard | E=Exonéré | AE=Autoliquidation | K=Intra-UE | G=Export | O=Hors champ | Z=Franchise — L/M exclus FR (UNTDID 5305)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeAllowanc",tt_er:"TT-49",puf_req:"M",puf_path:"Invoice/cac:AllowanceCharge[cbc:ChargeIndicator = 'true']/cac:TaxCategory/cbc:ID",puf_note:"Types follow UNTDID 5305 code list"},

  {id:"BT-105",g:"allowcharges",l:"Code de motif des charges ou frais au niveau du document",fr:"Code de motif des charges ou frais au niveau du document",m:false,s:["ei"],t:"CODE",d:"Motif des charges ou frais au niveau du document, exprimé sous forme de code. Utiliser les entrées de la liste de codes UNTDID 7161 [6]. Le Code de motif des charges ou frais au niveau du document et le Motif des charges ou frais au niveau du document doivent indiquer le même motif de frais.",r:"BR-38 BR-CO-6 BR-CO-22",ex:"AAB=Douane | AAC=Comptable | ABK=Emballage | AAS=Achat | FC=Fret | FI=Financement | PC=Conditionnement | ZZZ=Autres (UNTDID 7161)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeAllowanc",puf_req:"O",puf_path:"Invoice/cac:AllowanceCharge[cbc:ChargeIndicator = 'true']/cbc:AllowanceChargeReasonCode"},
  {id:"BT-106",g:"amounts",l:"Somme des montants nets des lignes de facture",fr:"Somme des montants nets des lignes de facture",m:true,s:["ei"],t:"MONTANT",d:"Somme du montant net de toutes les lignes de la Facture. BR-FR : BR-FR-DEC-01.",r:"BR-12 BR-CO-10",ex:"950.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",puf_req:"M",puf_path:"Invoice/cac:LegalMonetaryTotal/cbc:LineExtensionAmount"},
  {id:"BT-107",g:"amounts",l:"Somme des remises au niveau du document",fr:"Somme des remises au niveau du document",m:false,s:["ei"],t:"MONTANT",d:"Somme de toutes les remises au niveau du document de la Facture. Les remises appliquées au niveau des lignes sont incluses dans le Montant net de ligne de facture utilisé dans la Somme du montant net des lignes de facture. BR-FR : BR-FR-DEC-01.",r:"BR-CO-11",ex:"50.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",puf_req:"CM",puf_path:"Invoice/cac:LegalMonetaryTotal/cbc:AllowanceTotalAmount"},
  {id:"BT-108",g:"amounts",l:"Somme des charges ou frais au niveau du document",fr:"Somme des charges ou frais au niveau du document",m:false,s:["ei"],t:"MONTANT",d:"Somme de toutes les charges ou frais au niveau du document de la Facture. Les frais appliqués au niveau des lignes sont inclus dans le Montant net de ligne de facture utilisé dans la Somme du montant net des lignes de facture. BR-FR : BR-FR-DEC-01.",r:"BR-CO-12",ex:"15.00",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",puf_req:"CM",puf_path:"Invoice/cac:LegalMonetaryTotal/cbc:ChargeTotalAmount"},
  {id:"BT-109",g:"amounts",l:"Montant total de la facture hors TVA",fr:"Montant total de la facture hors TVA",m:true,s:["ei"],t:"MONTANT",d:"Montant total de la Facture, sans la TVA. Le Montant total de la facture hors TVA correspond à la Somme du montant net des lignes de facture, moins la Somme des remises au niveau du document, plus la Somme des charges ou frais au niveau du document. BR-FR : BR-FR-DEC-01.",r:"BR-13 BR-CO-13",ex:"915.00",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",tt_er:"TT-51",puf_req:"M",puf_path:"Invoice/cac:LegalMonetaryTotal/cbc:TaxExclusiveAmount"},
  {id:"BT-110",g:"amounts",l:"Montant total de TVA de la facture",fr:"Montant total de TVA de la facture",m:false,s:["ei"],t:"MONTANT",d:"Montant total de la TVA de la Facture. Le Montant total de la facture TVA comprise correspond à la somme de tous les montants de TVA des différents types de TVA. BR-FR : BR-FR-DEC-01.",r:"BR-CO-14",ex:"183.00",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cgi_upgrade:true,cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",tt_er:"TT-52",puf_req:"M",puf_path:"Invoice/cac:TaxTotal/cbc:TaxAmount"},
  {id:"BT-111",g:"amounts",l:"Montant total de TVA de la facture exprimée (devise de comptabilisation)",fr:"Montant total de TVA de la facture exprimée (devise de comptabilisation)",m:false,s:["ei"],t:"MONTANT",d:"Montant total de la TVA exprimé dans la devise de comptabilisation acceptée ou exigée dans le pays du Vendeur. Doit être utilisé lorsque la Devise de comptabilisation de la TVA diffère du Code de devise de facturation. La Devise de comptabilisation de la TVA n'est pas utilisée dans le calcul des totaux de la Facture. Les listes de devises valides sont enregistrées auprès de l'Agence de maintenance de la norme ISO 4217 « Codes pour la représentation des monnaies et types de fonds ». Il est recomm",r:"BR-53",ex:"183.00 EUR",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",tt_er:"TT-52",puf_req:"CM",puf_path:"Invoice/cac:TaxTotal/cbc:TaxAmount where @currencyID = cbc:TaxCurrency (BT-6)",puf_note:"Mandatory if document currency (BT-5) is not EUR."},
  {id:"BT-112",g:"amounts",l:"Montant total de la Facture, avec la TVA.",fr:"Montant total de la Facture, avec la TVA.",m:true,s:["ei"],t:"MONTANT",d:"Montant total de la Facture, avec la TVA. Le Montant total de la facture avec TVA comprise correspond au Montant total de la facture hors TVA auquel s'ajoute le Montant total de la facture TVA comprise. Le Montant total de la facture avec TVA comprise doit être supérieur ou égal à zéro. BR-FR : BR-FR-DEC-01.",r:"BR-14 BR-CO-15",ex:"1098.00",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",puf_req:"M",puf_path:"Invoice/cac:LegalMonetaryTotal/cbc:TaxInclusiveAmount"},
  {id:"BT-113",g:"amounts",l:"Montant payé",fr:"Montant payé",m:false,s:["ei"],t:"MONTANT",d:"Somme des montants qui ont été payés par anticipation. Ce montant est soustrait du montant total de la facture avec la TVA pour calculer le montant dû pour le paiement. BR-FR : BR-FR-DEC-01.",r:"",ex:"200.00 (acompte versé)",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",puf_req:"CM",puf_path:"Invoice/cac:LegalMonetaryTotal/cbc:PrepaidAmount"},
  {id:"BT-114",g:"amounts",l:"Montant arrondi",fr:"Montant arrondi",m:false,s:["ei"],t:"MONTANT",d:"Montant à ajouter au montant total de la facture pour arrondir le montant à payer. BR-FR : BR-FR-DEC-01.",r:"",ex:"0.02",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",puf_req:"CM",puf_path:"Invoice/cac:LegalMonetaryTotal/cbc:PayableRoundingAmount"},
  {id:"BT-115",g:"amounts",l:"Montant à payer",fr:"Montant à payer",m:true,s:["ei"],t:"MONTANT",d:"Encours dont le paiement est demandé. Ce montant correspond au Montant total de la facture avec TVA comprise, moins le Montant payé qui a été payé par anticipation. Ce montant est égal à zéro si la Facture a été entièrement payée. Il est négatif si le Montant payé est supérieur au Montant total de la facture avec TVA comprise. BR-FR : BR-FR-DEC-01.",r:"BR-15 BR-CO-16",ex:"898.00",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:SpecifiedTradeSettleme",puf_req:"M",puf_path:"Invoice/cac:LegalMonetaryTotal/cbc:PayableAmount"},
  {id:"BT-116",g:"vat",l:"Base d'imposition du type de TVA",fr:"Base d'imposition du type de TVA",m:true,s:["ei"],t:"MONTANT",d:"Somme de tous les montants imposables assujettis à un code et à un taux de type de TVA spécifiques (si le Taux de type de TVA est applicable). Somme du montant net des lignes de facture, moins les remises plus les charges ou frais au niveau du document qui sont assujettis à un code et à un taux de type de TVA spécifiques (si le Taux de type de TVA est applicable). BR-FR : BR-FR-DEC-01.",r:"BR-45",ex:"915.00 (base à 20%)",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram",tt_er:"TT-54",puf_req:"M",puf_path:"Invoice/cac:TaxTotal/cac:TaxSubtotal/cbc:TaxableAmount"},
  {id:"BT-117",g:"vat",l:"Montant de la TVA pour chaque type de TVA",fr:"Montant de la TVA pour chaque type de TVA",m:true,s:["ei"],t:"MONTANT",d:"Montant total de la TVA pour un type donné de TVA. S'obtient en multipliant la Base d'imposition du type de TVA par le Taux de type de TVA du type correspondant. BR-FR : BR-FR-DEC-01.",r:"BR-46 BR-CO-17",ex:"183.00",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram",idoc:"E1EDKT1[TDID=100].ZE1EDKT1.ZEIVTAXAMT1 / ZEIVTAXAMT2 / ZEIVTAXAMT3",vim_field:"new — agrégation montant TVA par taux (max 3 taux: 20%, 5.5%, 0%)",req_sap:true,sap_note:"Agrégation TVA par taux (max 3 champs). Confirmation Tradeshift: montants calculés par taux fournis. Fréquent: 20%, 5.5%, 0%.",tt_er:"TT-55",puf_req:"M",puf_path:"Invoice/cac:TaxTotal/cac:TaxSubtotal/cbc:TaxAmount"},
  {id:"BT-118",g:"vat",l:"Code de type de TVA",fr:"Code de type de TVA",m:true,s:["ei"],t:"CODE",d:"Identification codée d’un type de TVA. Les entrées suivantes de l'UNTDID 5305 [6] sont utilisées: S = Taux de TVA standard Z = Taux de TVA égal à 0 E = Exempté de TVA AE = Autoliquidation de TVA K =  Exonération pour cause de livraison intracommunautaire G = Exempté de TVA pour Export hors UE O = Hors du périmètre d'application de la TVA L = Îles Canaries M = Ceuta et Melilla BR-FR : BR-FR-15.",r:"BR-47",ex:"S=Standard | E=Exonéré | AE=Autoliquidation (art.283 CGI) | K=Livraison intra-UE (art.262 ter) | G=Export (art.262) | O=Hors champ | Z=Franchise (art.293B) — L/M exclus (BR-FR-15) (UNTDID 5305)",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram",tt_er:"TT-56",puf_req:"M",puf_path:"Invoice/cac:TaxTotal/cac:TaxSubtotal/cac:TaxCategory/cbc:ID",puf_note:"Types follow UNTDID 5305 code list"},
  {id:"BT-119",g:"vat",l:"Taux de type de TVA",fr:"Taux de type de TVA",m:false,s:["ei"],t:"POURCENTAGE",d:"Taux de TVA, exprimé sous forme de pourcentage, applicable au type de TVA correspondant. Le Code de type de TVA et le Taux de type de TVA doivent être cohérents. BR-FR : BR-FR-16 BR-FR-DEC-04.",r:"BR-48",ex:"20.00 | 10.00 | 5.50 | 7.00 | 8.50 | 2.10 | 13.00 | 0.00 (BR-FR-16)",ubl:"/Invoice /CreditNote",cgi:"1/09/2026",cgi_upgrade:true,cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram",idoc:"E1EDKT1[TDID=100].ZE1EDKT1.ZEIVTAXRATE1 / ZEIVTAXRATE2 / ZEIVTAXRATE3",vim_field:"new — taux TVA correspondants (max 3)",req_sap:true,sap_note:"3 champs pour 3 taux TVA max par facture. Même structure que ZEIVTAXAMT.",tt_er:"TT-57",puf_req:"M",puf_path:"Invoice/cac:TaxTotal/cac:TaxSubtotal/cac:TaxCategory/cbc:Percent"},
  {id:"BT-120",g:"vat",l:"Motif d'exonération de la TVA",fr:"Motif d'exonération de la TVA",m:false,s:["ei"],t:"TEXTE",d:"Énoncé expliquant pourquoi un montant est exonéré de TVA. Articles 226 items 11 to 15 Directive 2006/112/EN",r:"",ex:"TVA non applicable - art. 293 B du CGI | Autoliquidation - art. 283 CGI | Exonération - art. 262 ter CGI | Exonération export - art. 262 CGI",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram",idoc:"",vim_field:"PDF only — no VIM mapping required",req_sap:false,sap_note:"Référence légale exonération. Doit être visible dans le PDF rendu. Pas de mapping SAP requis.",tt_er:"TT-58",puf_req:"CM",puf_path:"Invoice/cac:TaxTotal/cac:TaxSubtotal/cac:TaxCategory/cbc:TaxExemptionReason"},
  {id:"BT-121",g:"vat",l:"Code de motif d'exonération de la TVA",fr:"Code de motif d'exonération de la TVA",m:false,s:["ei"],t:"CODE",d:"Code expliquant pourquoi un montant est exonéré de TVA. Liste de codes issue et maintenue par le CEF+P317 Codelist : EN16931 Codelists.",r:"",ex:"VATEX-EU-138=Livraison intra-UE | VATEX-EU-146=Export UE | VATEX-EU-132=Exonération art.132 | VATEX-FR-FRANCHISE=Franchise FR | VATEX-EU-79-C=Art.79c | VATEX-EU-148=Transport international",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeSettlement/ram:ApplicableTradeTax/ram",idoc:"E1EDKT1[TDID=100].ZE1EDKT1.ZEIVTAXSELFLQD",vim_field:"new text field — mention autoliquidation",req_sap:true,sap_note:"Champ mention autoliquidation (art.283 CGI). Confirmé requis par Edgar 07/04. Visible dans PDF.",tt_er:"TT-59",puf_req:"CM",puf_path:"Invoice/cac:TaxTotal/cac:TaxSubtotal/cac:TaxCategory/cbc:TaxExemptionReasonCode"},

  {id:"BT-123",g:"docs",l:"Description de document justificatif",fr:"Description de document justificatif",m:false,s:["ei"],t:"TEXTE",d:"Description du document justificatif. Exemple : feuille de temps, rapport d'utilisation, etc. BR-FR : BR-FR-17 BR-FR-18.",r:"",ex:"Bon de livraison | Feuille de temps | Rapport",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:AdditionalReferencedDoc"},
  {id:"BT-124",g:"docs",l:"Emplacement de document externe",fr:"Emplacement de document externe",m:false,s:["ei"],t:"TEXTE",d:"Adresse URL (Uniform Resource Locator) qui identifie l’emplacement du document externe. Moyen de localiser la ressource en décrivant son mécanisme d'accès primaire, par exemple http:// ou ftp://. L'Emplacement de document externe doit être utilisé si l'Acheteur exige des informations supplémentaires étayant la facture.",r:"",ex:"https://docs.acme.fr/bl-2026-00123.pdf",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:AdditionalReferencedDoc"},
  {id:"BT-125",g:"docs",l:"Document joint",fr:"Document joint",m:false,s:["ei"],t:"OBJET BIN",d:"Document annexe intégré sous forme d'objet binaire. Le Document joint est utilisé lorsque de la documentation doit être stockée avec la Facture à des fins de référence ultérieure ou d'audit.",r:"",ex:"[Contenu binaire encodé base64]",ubl:"/Invoice /CreditNote",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:ApplicableHeaderTradeAgreement/ram:AdditionalReferencedDoc"},
  {id:"BT-126",g:"lines",l:"Identifiant de ligne de facture",fr:"Identifiant de ligne de facture",m:true,s:["ei"],t:"IDENTIFIANT",d:"Identifiant unique d'une ligne au sein de la Facture.",r:"BR-21",ex:"1 | 2 | 3",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:AssociatedDocumentLin",puf_req:"M",puf_path:"Invoice/cac:InvoiceLine/cbc:ID",puf_note:"If not in source file the invoice line position will be used instead.",puf_path_note:"Mandatory in PUF"},
  {id:"BT-127",g:"lines",l:"Note de ligne de facture",fr:"Note de ligne de facture",m:false,s:["ei"],t:"TEXTE",d:"Commentaire fournissant des informations non structurées concernant la ligne de Facture.",r:"",ex:"Période sept. 2026 | Référence interne",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:AssociatedDocumentLin",tt_er:"TT-61-1",puf_req:"CM",puf_path:"Invoice/cac:InvoiceLine/cbc:Note",puf_note:"Subject Code (EXT-FR-FE-183) must be put between # on the beginning of the note. Mandatory in case of eco-tax (DEEE)."},
  {id:"BT-128",g:"lines",l:"Identifiant d'objet de ligne de facture",fr:"Identifiant d'objet de ligne de facture",m:false,s:["ei"],t:"IDENTIFIANT",d:"Identifiant d'un objet sur lequel la ligne de facturation est basée, attribué par le vendeur. Il peut s'agir d'un numéro d'abonnement, d'un numéro de téléphone, d'un compteur, etc., selon le cas. BR-FR : BR-FR-29 BR-FR-30 BR-FR-MV-03 BR-FR-MV-05 BR-FR-MV-07 BR-FR-MV-08 BR-FR-MV-11 BR-FR-MV-12.",r:"",ex:"ABONNEMENT-001 | COMPTEUR-12345678",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet"},
  {id:"BT-129",g:"lines",l:"Quantité facturée",fr:"Quantité facturée",m:true,s:["ei"],t:"QUANTITE",d:"Quantité d'articles (biens ou services) prise en compte dans la ligne de Facture. BR-FR : BR-FR-DEC-02.",r:"BR-22",ex:"10 | 2.5 | -1 (retour)",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeDel",tt_er:"TT-62",puf_req:"M",puf_path:"Invoice/cac:InvoiceLine/cbc:InvoicedQuantity",puf_path_note:"Note that for Credit Notes CreditNote/cac:CreditNoteLine/cbc:CreditedQuantity is to be used instead."},
  {id:"BT-130",g:"lines",l:"Code de l'unité de mesure de la quantité facturée",fr:"Code de l'unité de mesure de la quantité facturée",m:true,s:["ei"],t:"CODE",d:"Unité de mesure applicable à la quantité facturée. Il convient que les unités de mesure soient exprimées selon les termes de la Recommandation UN/ECE N ° 20 « Codes des unités de mesure utilisées dans le commerce international » [7], par exemple « KGM » pour kilogramme. Codelist : EN16931 Codelists.",r:"BR-23",ex:"C62=Pièce | HUR=Heure | DAY=Jour | MON=Mois | ANN=Année | KGM=Kg | GRM=Gramme | MTR=Mètre | MTK=m² | MTQ=m³ | LTR=Litre | KWH=kWh | TNE=Tonne | SET=Ensemble (UN/ECE Rec.20)",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeDel",tt_er:"TT-63",puf_req:"M",puf_path:"Invoice/cac:InvoiceLine/cbc:InvoicedQuantity/@unitCode"},
  {id:"BT-131",g:"lines",l:"Montant net de ligne de facture",fr:"Montant net de ligne de facture",m:true,s:["ei"],t:"MONTANT",d:"Montant total de la ligne de Facture. Ce montant est « net » hors TVA, c'est-à-dire qu'il inclut des remises et charges ou frais au niveau de la ligne ainsi que des autres taxes afférentes. BR-FR : BR-FR-DEC-01 BR-FR-MV-10.",r:"BR-24",ex:"500.00",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cgi:"1/09/2026",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet",puf_req:"M",puf_path:"Invoice/cac:InvoiceLine/cbc:LineExtensionAmount"},
  {id:"BT-132",g:"lines",l:"Référence de ligne de bon de commande référencée",fr:"Référence de ligne de bon de commande référencée",m:false,s:["ei"],t:"REFERENCE DU DOCUMEN",d:"Identifiant d'une ligne d'un bon de commande référencée, généré par l'Acheteur. L'Identifiant de bon de commande est référencé au niveau du document.",r:"",ex:"10 (numéro de ligne BC)",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeAgr",puf_req:"CM",puf_path:"Invoice/cac:InvoiceLine/cac:OrderLineReference/cbc:LineID",puf_note:"Mandatory if PO reference provided."},
  {id:"BT-133",g:"lines",l:"Référence comptable de l'acheteur de la ligne de facture",fr:"Référence comptable de l'acheteur de la ligne de facture",m:false,s:["ei"],t:"TEXTE",d:"Valeur textuelle spécifiant où imputer les données pertinentes dans les comptes comptables de l'Acheteur. Si nécessaire, cette référence doit être fournie par l'Acheteur au Vendeur avant émission de la Facture.",r:"",ex:"CC-MKTG-2026",ubl:"/Invoice/cac:InvoiceLine /CreditNote/cac:CreditNoteLine",cii:"/rsm:CrossIndustryInvoice/rsm:SupplyChainTradeTransaction/ram:IncludedSupplyChainTradeLineItem/ram:SpecifiedLineTradeSet",puf_req:"O",puf_path:"Invoice/cac:InvoiceLine/cbc:AccountingCost"},

const SXML=`<?xml version="1.0" encoding="UTF-8"?><Invoice xmlns="urn:oasis:names:specification:ubl:schema:xsd:Invoice-2" xmlns:cac="urn:oasis:names:specification:ubl:schema:xsd:CommonAggregateComponents-2" xmlns:cbc="urn:oasis:names:specification:ubl:schema:xsd:CommonBasicComponents-2"><cbc:CustomizationID>urn:cen.eu:en16931:2017</cbc:CustomizationID><cbc:ID>FA-2026-00123</cbc:ID><cbc:IssueDate>2026-09-01</cbc:IssueDate><cbc:InvoiceTypeCode>380</cbc:InvoiceTypeCode><cbc:Note subjectCode="BAR">CHORUS_PRO</cbc:Note><cbc:DocumentCurrencyCode>EUR</cbc:DocumentCurrencyCode><cac:AccountingSupplierParty><cac:Party><cac:PartyLegalEntity><cbc:RegistrationName>Acme France SAS</cbc:RegistrationName><cbc:CompanyID schemeID="0009">12345678900010</cbc:CompanyID></cac:PartyLegalEntity><cac:PartyTaxScheme><cbc:CompanyID>FR12345678900</cbc:CompanyID><cac:TaxScheme><cbc:ID>VAT</cbc:ID></cac:TaxScheme></cac:PartyTaxScheme></cac:Party></cac:AccountingSupplierParty><cac:AccountingCustomerParty><cac:Party><cac:PartyLegalEntity><cbc:RegistrationName>Client Corp SARL</cbc:RegistrationName><cbc:CompanyID schemeID="0009">98765432100024</cbc:CompanyID></cac:PartyLegalEntity></cac:Party></cac:AccountingCustomerParty><cac:TaxTotal><cbc:TaxAmount currencyID="EUR">200.00</cbc:TaxAmount><cac:TaxSubtotal><cbc:TaxableAmount currencyID="EUR">1000.00</cbc:TaxableAmount><cbc:TaxAmount currencyID="EUR">200.00</cbc:TaxAmount><cac:TaxCategory><cbc:ID>S</cbc:ID><cbc:Percent>20</cbc:Percent><cac:TaxScheme><cbc:ID>VAT</cbc:ID></cac:TaxScheme></cac:TaxCategory></cac:TaxSubtotal></cac:TaxTotal><cac:LegalMonetaryTotal><cbc:LineExtensionAmount currencyID="EUR">1000.00</cbc:LineExtensionAmount><cbc:TaxExclusiveAmount currencyID="EUR">1000.00</cbc:TaxExclusiveAmount><cbc:TaxInclusiveAmount currencyID="EUR">1200.00</cbc:TaxInclusiveAmount><cbc:PayableAmount currencyID="EUR">1200.00</cbc:PayableAmount></cac:LegalMonetaryTotal><cac:InvoiceLine><cbc:ID>1</cbc:ID><cbc:InvoicedQuantity unitCode="HUR">20</cbc:InvoicedQuantity><cbc:LineExtensionAmount currencyID="EUR">1000.00</cbc:LineExtensionAmount><cac:Item><cbc:Name>Prestation de conseil</cbc:Name><cac:ClassifiedTaxCategory><cbc:ID>S</cbc:ID><cbc:Percent>20</cbc:Percent><cac:TaxScheme><cbc:ID>VAT</cbc:ID></cac:TaxScheme></cac:ClassifiedTaxCategory></cac:Item><cac:Price><cbc:PriceAmount currencyID="EUR">50.00</cbc:PriceAmount></cac:Price></cac:InvoiceLine></Invoice>`;

function validateXML(xml){
  const errs=[],warns=[],infos=[];
  let doc,fmt="UNKNOWN";
  try{doc=new DOMParser().parseFromString(xml,"application/xml");const pe=doc.querySelector("parseerror");if(pe)return{valid:false,errs:[{r:"PARSE",f:"",m:"XML parse error: "+pe.textContent.substring(0,150)}],warns:[],infos:[],fmt:"INVALID"};}catch(e){return{valid:false,errs:[{r:"PARSE",f:"",m:e.message}],warns:[],infos:[],fmt:"INVALID"};}
  infos.push({r:"PARSE",f:"",m:"XML is well-formed"});
  if(xml.includes("CrossIndustryInvoice")||xml.includes("rsm:"))fmt="CII";
  else if(xml.includes("Invoice-2")||xml.includes("urn:oasis"))fmt="UBL";
  else if(xml.includes("Transmission")&&xml.includes("Entete"))fmt="EREPORTING";
  infos.push({r:"FORMAT",f:"",m:"Format: "+fmt});
  const ns={"cbc":"urn:oasis:names:specification:ubl:schema:xsd:CommonBasicComponents-2","cac":"urn:oasis:names:specification:ubl:schema:xsd:CommonAggregateComponents-2","rsm":"urn:un:unece:uncefact:data:standard:CrossIndustryInvoice:100","ram":"urn:un:unece:uncefact:data:standard:ReusableAggregateBusinessInformationEntity:100","udt":"urn:un:unece:uncefact:data:standard:UnqualifiedDataType:100"};
  const xg=(xp)=>{try{const r=doc.evaluate(xp,doc,p=>ns[p]||null,XPathResult.FIRST_ORDERED_NODE_TYPE,null);return r.singleNodeValue?.textContent?.trim()||null;}catch{return null;}};
  const xa=(xp)=>{try{const it=doc.evaluate(xp,doc,p=>ns[p]||null,XPathResult.ORDERED_NODE_ITERATOR_TYPE,null);const r=[];let n;while((n=it.iterateNext()))r.push(n.textContent.trim());return r;}catch{return[];}};
  if(fmt==="UBL"){
    const spec=xg("//cbc:CustomizationID");if(!spec)errs.push({r:"BR-1",f:"BT-24",m:"Missing CustomizationID (BT-24). Required: urn:cen.eu:en16931:2017"});else infos.push({r:"BR-1",f:"BT-24",m:"BT-24: "+spec});
    const id=xg("//cbc:ID[1]");if(!id)errs.push({r:"BR-2",f:"BT-1",m:"Missing Invoice ID (BT-1)"});else infos.push({r:"BR-2",f:"BT-1",m:"BT-1: "+id});
    const dt=xg("//cbc:IssueDate");if(!dt)errs.push({r:"BR-3",f:"BT-2",m:"Missing IssueDate (BT-2)"});else if(!/^\d{4}-\d{2}-\d{2}$/.test(dt))errs.push({r:"BR-3",f:"BT-2",m:"BT-2 format invalid: "+dt});else infos.push({r:"BR-3",f:"BT-2",m:"BT-2: "+dt});
    const tc=xg("//cbc:InvoiceTypeCode");if(!tc)errs.push({r:"BR-4",f:"BT-3",m:"Missing InvoiceTypeCode (BT-3)"});else if(!["380","381","384","389","394"].includes(tc))warns.push({r:"BR-4",f:"BT-3",m:"BT-3 type code may be invalid: "+tc});else infos.push({r:"BR-4",f:"BT-3",m:"BT-3: "+tc});
    const cur=xg("//cbc:DocumentCurrencyCode");if(!cur)errs.push({r:"BR-5",f:"BT-5",m:"Missing DocumentCurrencyCode (BT-5)"});else infos.push({r:"BR-5",f:"BT-5",m:"BT-5: "+cur});
    const sn=xg("//cac:AccountingSupplierParty//cbc:RegistrationName");if(!sn)errs.push({r:"BR-6",f:"BT-27",m:"Missing Seller RegistrationName (BT-27)"});else infos.push({r:"BR-6",f:"BT-27",m:"Seller: "+sn});
    const ssiret=xg("//cac:AccountingSupplierParty//cac:PartyLegalEntity/cbc:CompanyID");if(!ssiret)errs.push({r:"BR-FR-02",f:"BT-30",m:"AFNOR MANDATORY: Missing Seller SIREN/SIRET (BT-30)"});else{const d=ssiret.replace(/[^0-9]/g,"");if(d.length!==9&&d.length!==14)errs.push({r:"BR-FR-02",f:"BT-30",m:"BT-30 invalid length: "+ssiret});else infos.push({r:"BR-FR-02",f:"BT-30",m:"BT-30: "+ssiret+" ("+(d.length===14?"SIRET":"SIREN")+")"});}
    const svat=xg("//cac:AccountingSupplierParty//cac:PartyTaxScheme/cbc:CompanyID");if(svat)infos.push({r:"BR-CO-9",f:"BT-31",m:"BT-31 Seller VAT: "+svat});
    const bn=xg("//cac:AccountingCustomerParty//cbc:RegistrationName");if(!bn)errs.push({r:"BR-7",f:"BT-44",m:"Missing Buyer RegistrationName (BT-44)"});else infos.push({r:"BR-7",f:"BT-44",m:"Buyer: "+bn});
    const bsiret=xg("//cac:AccountingCustomerParty//cac:PartyLegalEntity/cbc:CompanyID");if(bsiret)infos.push({r:"BR-FR-03",f:"BT-47",m:"BT-47 Buyer SIREN/SIRET: "+bsiret});else warns.push({r:"BR-FR-03",f:"BT-47",m:"BT-47 Buyer SIREN/SIRET missing. Recommended for PPF Annuaire"});
    const bt49=xg("//cac:AccountingCustomerParty//cac:Party/cbc:EndpointID")||xg("//cac:AccountingCustomerParty//cac:PartyIdentification/cbc:ID");
    if(!bt49)warns.push({r:"ANNUAIRE-BT49",f:"BT-49",m:"ANNUAIRE: BT-49 absent. Sans cette adresse le PPF ne peut PAS router la facture → rejet CDAR 211 code AB. Demander à l'acheteur de s'enregistrer dans l'Annuaire PPF via sa PA."});else infos.push({r:"ANNUAIRE-BT49",f:"BT-49",m:"BT-49 Annuaire: "+bt49});
    let barFound=false;try{barFound=!!doc.evaluate("//cbc:Note[@subjectCode='BAR']",doc,null,XPathResult.FIRST_ORDERED_NODE_TYPE,null).singleNodeValue;}catch{}
    if(!barFound)warns.push({r:"BR-FR-20",f:"BT-21/22",m:"AFNOR: No BAR note. Add <cbc:Note subjectCode='BAR'> for e-invoicing scope"});else infos.push({r:"BR-FR-20",f:"BT-21/22",m:"BAR note present"});
    const texcl=xg("//cac:LegalMonetaryTotal/cbc:TaxExclusiveAmount"),tincl=xg("//cac:LegalMonetaryTotal/cbc:TaxInclusiveAmount"),pay=xg("//cac:LegalMonetaryTotal/cbc:PayableAmount"),ttax=xg("//cac:TaxTotal/cbc:TaxAmount");
    if(!texcl)errs.push({r:"BR-14",f:"BT-109",m:"Missing TaxExclusiveAmount (BT-109)"});else infos.push({r:"",f:"BT-109",m:"BT-109 HT: "+texcl});
    if(!tincl)errs.push({r:"BR-CO-15",f:"BT-112",m:"Missing TaxInclusiveAmount (BT-112)"});else infos.push({r:"",f:"BT-112",m:"BT-112 TTC: "+tincl});
    if(!pay)errs.push({r:"BR-CO-16",f:"BT-115",m:"Missing PayableAmount (BT-115)"});else infos.push({r:"",f:"BT-115",m:"BT-115 Due: "+pay});
    if(!ttax)errs.push({r:"BR-CO-14",f:"BT-110",m:"Missing TaxTotal/TaxAmount (BT-110)"});else infos.push({r:"",f:"BT-110",m:"BT-110 VAT: "+ttax});
    if(texcl&&tincl&&ttax){const e=parseFloat(texcl),i=parseFloat(tincl),t=parseFloat(ttax);if(Math.abs((e+t)-i)>0.02)errs.push({r:"BR-CO-15",f:"BT-112",m:"BR-CO-15 FAIL: HT("+e+")+VAT("+t+")="+(e+t).toFixed(2)+" ≠ TTC("+i+")"});else infos.push({r:"BR-CO-15",f:"",m:"Amounts OK: "+e+"+"+t+"="+i});}
    const lines=xa("//cac:InvoiceLine/cbc:ID");if(lines.length===0)errs.push({r:"BR-16",f:"BT-126",m:"No InvoiceLine found"});else{infos.push({r:"",f:"",m:lines.length+" line(s)"});const nm=xa("//cac:InvoiceLine//cbc:Name");if(nm.length<lines.length)errs.push({r:"BR-25",f:"BT-153",m:(lines.length-nm.length)+" line(s) missing Item Name"});}
    const txc=xa("//cac:TaxSubtotal/cac:TaxCategory/cbc:ID");if(txc.length===0)errs.push({r:"BR-CO-18",f:"BT-118",m:"No TaxSubtotal found"});else infos.push({r:"",f:"",m:txc.length+" VAT category(ies): "+txc.join(", ")});
  }else if(fmt==="CII"){
    const spec=xg("//ram:GuidelineSpecifiedDocumentContextParameter/ram:ID");if(!spec)errs.push({r:"BR-1",f:"BT-24",m:"Missing GuidelineSpecifiedDocumentContextParameter/ID"});else infos.push({r:"BR-1",f:"BT-24",m:"BT-24: "+spec});
    const id=xg("//rsm:ExchangedDocument/ram:ID");if(!id)errs.push({r:"BR-2",f:"BT-1",m:"Missing ExchangedDocument/ID (BT-1)"});else infos.push({r:"BR-2",f:"BT-1",m:"BT-1: "+id});
    const sn=xg("//ram:SellerTradeParty/ram:Name");if(!sn)errs.push({r:"BR-6",f:"BT-27",m:"Missing SellerTradeParty/Name"});else infos.push({r:"BR-6",f:"BT-27",m:"Seller: "+sn});
    const ss=xg("//ram:SellerTradeParty/ram:SpecifiedLegalOrganization/ram:ID");if(!ss)errs.push({r:"BR-FR-02",f:"BT-30",m:"AFNOR: Missing Seller SIREN/SIRET in SpecifiedLegalOrganization/ID"});else infos.push({r:"BR-FR-02",f:"BT-30",m:"BT-30: "+ss});
    const bn=xg("//ram:BuyerTradeParty/ram:Name");if(!bn)errs.push({r:"BR-7",f:"BT-44",m:"Missing BuyerTradeParty/Name"});else infos.push({r:"BR-7",f:"BT-44",m:"Buyer: "+bn});
    const total=xg("//ram:SpecifiedTradeSettlementHeaderMonetarySummation/ram:GrandTotalAmount");if(!total)errs.push({r:"BR-CO-15",f:"BT-112",m:"Missing GrandTotalAmount"});else infos.push({r:"",f:"BT-112",m:"TTC: "+total});
  }else if(fmt==="EREPORTING"){
    const tid=xml.match(/<IdentifiantTransmission>(.*?)<\/IdentifiantTransmission>/)?.[1];if(!tid)errs.push({r:"ER-01",f:"ER-01",m:"Missing IdentifiantTransmission"});else infos.push({r:"ER-01",f:"ER-01",m:"ID: "+tid});
    const siret=xml.match(/<SiretDeclarant>(.*?)<\/SiretDeclarant>/)?.[1];if(!siret)errs.push({r:"ER-05",f:"ER-05",m:"Missing SiretDeclarant"});else if(siret.replace(/[^0-9]/g,"").length!==14)errs.push({r:"ER-05",f:"ER-05",m:"SIRET invalid: "+siret});else infos.push({r:"ER-05",f:"ER-05",m:"SIRET: "+siret});
    const pd=xml.match(/<PeriodeDebut>(.*?)<\/PeriodeDebut>/)?.[1],pf=xml.match(/<PeriodeFin>(.*?)<\/PeriodeFin>/)?.[1];
    if(!pd||!pf)errs.push({r:"ER-03",f:"ER-03/04",m:"Missing period dates"});else if(pd>pf)errs.push({r:"ER-03",f:"ER-03/04",m:"Period invalid: start "+pd+" after end "+pf});else infos.push({r:"ER-03",f:"ER-03/04",m:"Period: "+pd+" to "+pf});
    const b2c=(xml.match(/<OperationB2C>/g)||[]).length,intl=(xml.match(/<OperationB2BInternational>/g)||[]).length;
    infos.push({r:"",f:"",m:b2c+" B2C block(s), "+intl+" B2B-INT block(s)"});
  }else{warns.push({r:"FORMAT",f:"",m:"Unknown format. Supported: UBL 2.1, CII/Factur-X, DGFiP e-Reporting XML"});}
  return{valid:errs.length===0,errs,warns,infos,fmt,stats:{e:errs.length,w:warns.length,p:infos.length}};
}

  const [bfrQ,setBfrQ]=useState('');
  const [pufType,setPufType]=useState('sales_b2bi');

  const [selUC,setSelUC]=useState(UC[0]);
  const [ucCat,setUcCat]=useState("all");
  const [ucSort,setUcSort]=useState("id");
  const [ucSortDir,setUcSortDir]=useState("asc");
  const [ucLang,setUcLang]=useState("fr");
  const [ucCoty,setUcCoty]=useState("all");
  const [xml,setXml]=useState(SXML);
  const [res,setRes]=useState(null);
  const [validating,setValidating]=useState(false);
  const [msgs,setMsgs]=useState([]);
  const [aiIn,setAiIn]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiErr,setAiErr]=useState(null);
  const fileRef=useRef();
  const bottomRef=useRef();
  const inputRef=useRef();

  const filtBT=useMemo(()=>BT.filter(f=>{
    if(grp!=="all"&&f.g!==grp)return false;
    if(sc==="ei"&&!f.s.includes("ei"))return false;
    if(sc==="cgi"&&!f.cgi)return false;
    if(req==="req"&&!f.m)return false;
    if(req==="opt"&&f.m)return false;
    if(q){const s=q.toLowerCase();return f.id.toLowerCase().includes(s)||f.l.toLowerCase().includes(s)||f.fr.toLowerCase().includes(s)||f.d.toLowerCase().includes(s);}
    return true;
  }),[grp,sc,req,q]);

  const sortedBT=useMemo(()=>[...filtBT].sort((a,b)=>{
    let va,vb;
    if(sortBy==="id"){va=parseInt(a.id.replace(/[^0-9]/g,""))||0;vb=parseInt(b.id.replace(/[^0-9]/g,""))||0;}
    else if(sortBy==="l"){va=a.l.toLowerCase();vb=b.l.toLowerCase();}
    else if(sortBy==="m"){va=a.m?0:1;vb=b.m?0:1;}
    else{va=a[sortBy];vb=b[sortBy];}
    if(va<vb)return sortDir==="asc"?-1:1;
    if(va>vb)return sortDir==="asc"?1:-1;
    return 0;
  }),[filtBT,sortBy,sortDir]);

  const filtUC=useMemo(()=>UC.filter(u=>ucCat==="all"||u.cat===ucCat),[ucCat]);
  const filtILC=useMemo(()=>ILC.filter(s=>ilcFam==="all"||s.famille===ilcFam),[ilcFam]);

  const doVal=useCallback(()=>{setValidating(true);setTimeout(()=>{setRes(validateXML(xml));setValidating(false);},300);},[xml]);

  const sendMsg=useCallback(async(text)=>{
    const t=(text||aiIn).trim();if(!t||aiLoading)return;
    setAiIn("");setAiErr(null);
    const nm=[...msgs,{role:"user",content:t}];
    setMsgs(nm);setAiLoading(true);
    setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),50);
    try{
      const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:SYS,messages:nm})});
      const raw=await r.text();
      if(!r.ok){let msg="HTTP "+r.status;try{const e=JSON.parse(raw);msg=e?.error?.message||e?.error||msg;}catch(x){}throw new Error(msg);}
      let d;try{d=JSON.parse(raw);}catch(x){throw new Error("Invalid JSON: "+raw.substring(0,100));}
      if(d.error){throw new Error(d.error?.message||JSON.stringify(d.error));}
      const reply=(d.content?.filter(b=>b.type==="text").map(b=>b.text).join(""))||d.completion||"(réponse vide)";
      setMsgs(p=>[...p,{role:"assistant",content:reply}]);
    }catch(e){setAiErr(e.message);}
    finally{setAiLoading(false);setTimeout(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});inputRef.current?.focus();},80);}
  },[aiIn,aiLoading,msgs]);

  const ts=(id)=>({padding:"8px 14px",borderRadius:7,cursor:"pointer",fontWeight:600,fontSize:12,background:tab===id?"rgba(99,102,241,0.2)":"transparent",color:tab===id?"#A5B4FC":"rgba(255,255,255,0.4)",border:tab===id?"1px solid rgba(99,102,241,0.4)":"1px solid transparent",transition:"all 0.15s"});
  const sort=(key)=>{if(sortBy===key)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortBy(key);setSortDir("asc");}};

  return (
    <div style={{height:"100vh",overflow:"hidden",background:"#080B14",color:"#E2E8F0",fontFamily:"'DM Sans','Segoe UI',sans-serif",display:"flex",flexDirection:"column"}}>

        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:8,background:"linear-gradient(135deg,#6366F1,#06B6D4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🧾</div>
          <div>
            <div style={{fontFamily:"JetBrains Mono,monospace",fontWeight:800,fontSize:15}}>AFNOR <span style={{color:"#6366F1"}}>XP Z12</span> Suite</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>E-Invoicing · E-Reporting · PA Simulator · France 2026</div>
          </div>
        </div>
        <div style={{display:"flex",gap:2,background:"rgba(0,0,0,0.3)",borderRadius:8,padding:3,marginLeft:"auto",flexWrap:"wrap"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={ts(t.id)}>{t.i} {t.l}</button>)}
        </div>
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
      {/* ── BT FIELDS ── */}
      {tab==="bt"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",flex:1,overflow:"hidden",minHeight:0,height:"calc(100vh - 58px)"}}>

          {/* LEFT PANEL — list */}
          <div style={{borderRight:"1px solid rgba(255,255,255,0.07)",display:"flex",flexDirection:"column",overflow:"hidden",height:"100%"}}>

            {/* Sticky search + filters header */}
            <div style={{padding:"10px 12px",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0,background:"#0f1117"}}>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher un champ BT..." style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,padding:"7px 10px",color:"#E2E8F0",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
              <div style={{display:"flex",gap:3,marginTop:7,flexWrap:"wrap"}}>
                {[["all","Tous","#6366F1"],["ei","E-Invoice","#3B82F6"],["cgi","📋 CGI Art.289bis","#F59E0B"]].map(([v,l,c])=><P key={v} label={l} active={sc===v} onClick={()=>setSc(v)} color={c}/>)}
                <span style={{width:1,background:"rgba(255,255,255,0.1)",margin:"0 2px"}}/>
                {[["all","Req+Opt","#6366F1"],["req","Required","#EF4444"],["opt","Optional","rgba(255,255,255,0.4)"]].map(([v,l,c])=><P key={v} label={l} active={req===v} onClick={()=>setReq(v)} color={c}/>)}
